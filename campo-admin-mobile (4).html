  const [anioLluvias, setAnioLluvias] = useState(null);
  const [anioResumen, setAnioResumen] = useState("todos");
  const [editHaNorte, setEditHaNorte] = useState(false);
  const [editHaSur, setEditHaSur] = useState(false);
  const [haInputNorte, setHaInputNorte] = useState("");
  const [haInputSur, setHaInputSur] = useState("");

  const misNovedades = [
    ...((novedadesAgri[estabId]?.norte || []).map(n => ({ ...n, lote: "Norte" }))),
    ...((novedadesAgri[estabId]?.sur   || []).map(n => ({ ...n, lote: "Sur" }))),
  ].sort((a, b) => b.fecha.localeCompare(a.fecha));

  const misHa = hectareasAgri[estabId] || {};

  const setHa = (pos, val) => setHectareasAgri(prev => ({ ...prev, [estabId]: { ...(prev[estabId] || {}), [pos]: val } }));

  const novedadesHelpers = (pos) => ({
    novedades: novedadesAgri[estabId]?.[pos] || [],
    onSave:     (n) => setNovedadesAgri(prev => ({ ...prev, [estabId]: { ...(prev[estabId] || {}), [pos]: [{ ...n, id: "NA" + Date.now() }, ...(prev[estabId]?.[pos] || [])] } })),
    onActualizar: (n) => setNovedadesAgri(prev => ({ ...prev, [estabId]: { ...(prev[estabId] || {}), [pos]: (prev[estabId]?.[pos] || []).map(x => x.id === n.id ? n : x) } })),
    onEliminar: (id) => setNovedadesAgri(prev => ({ ...prev, [estabId]: { ...(prev[estabId] || {}), [pos]: (prev[estabId]?.[pos] || []).filter(x => x.id !== id) } })),
  });

  const nombreResumen = (pos) => {
    const cs = (cultivos[estabId]?.[pos] || []).filter(c => c.estado === "activo" || (c.estado === undefined && c.actual));
    return cs.length > 0 ? cs.map(c => nombreCultivo(c)).join(" / ") : null;
  };

  const agregarLabor = (labor) => {
    setCultivos(prev => {
      const c = JSON.parse(JSON.stringify(prev));
      if (!c[estabId]) c[estabId] = { norte: [], sur: [] };
      if (!c[estabId][vista]) c[estabId][vista] = [];
      const lote = c[estabId][vista];
      const isActivo = (cult) => cult.estado === "activo" || (cult.estado === undefined && cult.actual);
      if (labor.tipo === "siembra") {
        lote.unshift({ id: "C" + Date.now(), componentes: labor.componentes, fecha: labor.fecha, quienSembro: labor.quienSembro, distSurco: labor.distSurco, densidad: labor.densidad, categoria: labor.categoria, estado: "activo", actual: true, labores: [] });
      } else if (labor.tipo === "cosecha") {
        c[estabId][vista] = lote.map(cult => {
          const esElCultivo = labor.cultivoId ? cult.id === labor.cultivoId : isActivo(cult);
          if (esElCultivo) return { ...cult, estado: "cosechado", actual: false, rinde: labor.rinde, unidad: labor.unidad, labores: [...(cult.labores || []), { tipo: "cosecha", fecha: labor.fecha, rinde: labor.rinde, unidad: labor.unidad, humedad: labor.humedad, obs: labor.obs }] };
          return cult;
        });
      } else if (labor.tipo === "editar_siembra") {
        c[estabId][vista] = lote.map(cult => cult.id === labor.id ? { ...cult, componentes: labor.componentes, fecha: labor.fecha, quienSembro: labor.quienSembro, distSurco: labor.distSurco, densidad: labor.densidad, categoria: labor.categoria } : cult);
      } else if (labor.tipo === "eliminar_cultivo") {
        c[estabId][vista] = lote.filter(cult => cult.id !== labor.id);
      } else if (labor.tipo === "editar_labor") {
        c[estabId][vista] = lote.map(cult => {
          if (cult.id !== labor.cultivoId) return cult;
          const labores = (cult.labores || []).map((l, idx) => {
            const match = l.id ? l.id === labor.laborId : idx === labor.laborId;
            return match ? { ...l, ...labor.cambios } : l;
          });
          return { ...cult, labores };
        });
      } else if (labor.tipo === "eliminar_labor") {
        c[estabId][vista] = lote.map(cult => {
          if (cult.id !== labor.cultivoId) return cult;
          const labores = (cult.labores || []).filter((l, idx) => l.id ? l.id !== labor.laborId : idx !== labor.laborId);
          return { ...cult, labores };
        });
      } else {
        c[estabId][vista] = lote.map(cult => isActivo(cult) ? { ...cult, labores: [...(cult.labores || []), { ...labor, id: "L" + Date.now() }] } : cult);
      }
      return c;
    });
    const labels = { siembra: "Siembra registrada", cosecha: "Cosecha registrada", aplicacion: "Aplicación registrada", laboreo: "Laboreo registrado", editar_siembra: "Siembra actualizada", editar_labor: "Actividad actualizada", eliminar_labor: "Actividad eliminada", eliminar_cultivo: "Cultivo eliminado" };
    showToast("\u2713 " + (labels[labor.tipo] || "Actividad registrada"));
  };

  const agregarLluvia = (lluvia) => {
    setLluvias(prev => { const c = JSON.parse(JSON.stringify(prev)); if (!c[estabId]) c[estabId] = []; c[estabId].push(lluvia); return c; });
    showToast("\u2713 Lluvia registrada");
  };

  if (vista === "norte" || vista === "sur") {
    const nh = novedadesHelpers(vista);
    const loteConf = estab.lotesCroquis.find(l => l.pos === vista);
    const subloteOpts = loteConf?.subdividido ? [
      { value: null, label: "Lote completo" },
      { value: "A", label: "Norte A (35 ha)" },
      { value: "B", label: "Norte B (20 ha)" },
    ] : null;
    return <DetalleLote estabNombre={estabNombre} loteNombre={vista.charAt(0).toUpperCase() + vista.slice(1)} cultivos={cultivos[estabId]?.[vista] || []} onAgregarLabor={agregarLabor} subloteOpts={subloteOpts} novedades={nh.novedades} onSaveNovedad={nh.onSave} onActualizarNovedad={nh.onActualizar} onEliminarNovedad={nh.onEliminar} onVolver={() => setVista(null)} />;
  }

  if (vista === "lluvias") {
    const lluviasEstab = lluvias[estabId] || [];

    // Año agrícola: julio-junio. Ej: "2024/25" = jul2024-jun2025
    const getMesAgri = (fecha) => { // returns { anioAgri: "2024/25", mesNum: 0-11 donde 0=Jul }
      const d = new Date(fecha + "T00:00:00");
      const m = d.getMonth(); // 0=Jan...6=Jul
      const y = d.getFullYear();
      const anioInicio = m >= 6 ? y : y - 1; // Jul+ → este año es inicio
      return { anioAgri: anioInicio + "/" + String(anioInicio + 1).slice(2), anioInicio, mesIdx: (m - 6 + 12) % 12 };
    };

    // Años agrícolas disponibles
    const aniosAgri = [...new Set(lluviasEstab.map(l => getMesAgri(l.fecha).anioAgri))].sort((a,b) => b.localeCompare(a));
    // Año actual
    const hoy = new Date();
    const anioActual = (hoy.getMonth() >= 6 ? hoy.getFullYear() : hoy.getFullYear() - 1);
    const anioActualStr = anioActual + "/" + String(anioActual + 1).slice(2);

    const anioSel = anioLluvias || anioActualStr;
    const anioSel2 = aniosAgri.find(a => a !== anioSel); // año anterior para comparar

    const MESES_AGRI = ["Jul","Ago","Sep","Oct","Nov","Dic","Ene","Feb","Mar","Apr","May","Jun"];

    const mmPorMes = (anio) => {
      const mm = Array(12).fill(0);
      lluviasEstab.filter(l => getMesAgri(l.fecha).anioAgri === anio).forEach(l => {
        const { mesIdx } = getMesAgri(l.fecha);
        mm[mesIdx] += Number(l.mm || 0);
      });
      return mm;
    };

    const mmActual = mmPorMes(anioSel);
    const mmAnterior = anioSel2 ? mmPorMes(anioSel2) : null;
    const totalActual = mmActual.reduce((s, v) => s + v, 0);
    const totalAnterior = mmAnterior ? mmAnterior.reduce((s, v) => s + v, 0) : null;
    const maxMm = Math.max(...mmActual, ...(mmAnterior || [0]), 1);
    const mesActual = hoy.getMonth() >= 6 ? hoy.getMonth() - 6 : hoy.getMonth() + 6;

    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg }}>
        <div style={{ background: COLORS.earth, padding: "0 24px" }}>
          <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", gap: 10, height: 56 }}>
            <button onClick={() => setVista(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>←</button>
            <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>🌧 Lluvias — {estabNombre}</span>
            <Btn small onClick={() => setModalLluvia(true)} style={{ marginLeft: "auto", background: "rgba(255,255,255,0.15)", color: "#fff", border: "1px solid rgba(255,255,255,0.4)" }}>+ Registrar</Btn>
          </div>
        </div>

        <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px" }}>

          {/* Selector de año agrícola */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20, alignItems: "center" }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted }}>AÑO AGRÍCOLA:</span>
            {[anioActualStr, ...aniosAgri.filter(a => a !== anioActualStr)].filter((a, i, arr) => arr.indexOf(a) === i).map(a => (
              <div key={a} onClick={() => setAnioLluvias(a)} style={{ padding: "5px 14px", borderRadius: 14, fontSize: 13, fontWeight: 600, cursor: "pointer", background: anioSel === a ? COLORS.recria : COLORS.bg, color: anioSel === a ? "#fff" : COLORS.textMuted, border: "1px solid " + (anioSel === a ? COLORS.recria : COLORS.border) }}>
                {a}{a === anioActualStr ? " ●" : ""}
              </div>
            ))}
          </div>

          {/* Totales */}
          <div style={{ display: "flex", gap: 16, marginBottom: 24 }}>
            <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.recria, borderRadius: 8, padding: "14px 20px", flex: 1 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.textMuted, marginBottom: 4 }}>TOTAL {anioSel}</div>
              <div style={{ fontFamily: "Georgia, serif", fontSize: 28, fontWeight: 700, color: COLORS.recria }}>{Math.round(totalActual)} mm</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{lluviasEstab.filter(l => getMesAgri(l.fecha).anioAgri === anioSel).length} eventos</div>
            </div>
            {totalAnterior !== null && (
              <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.earth, borderRadius: 8, padding: "14px 20px", flex: 1 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.textMuted, marginBottom: 4 }}>AÑO ANTERIOR {anioSel2}</div>
                <div style={{ fontFamily: "Georgia, serif", fontSize: 28, fontWeight: 700, color: COLORS.earth }}>{Math.round(totalAnterior)} mm</div>
                <div style={{ fontSize: 12, color: totalActual >= totalAnterior ? COLORS.success : COLORS.danger, fontWeight: 600, marginTop: 2 }}>
                  {totalActual >= totalAnterior ? "+" : ""}{Math.round(totalActual - totalAnterior)} mm vs año anterior
                </div>
              </div>
            )}
          </div>

          {/* Gráfico mensual */}
          <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderRadius: 10, padding: "16px 18px", marginBottom: 24 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textMuted, marginBottom: 14 }}>DESGLOSE MENSUAL (jul → jun)</div>
            {MESES_AGRI.map((mes, idx) => {
              const mmA = mmActual[idx];
              const mmB = mmAnterior ? mmAnterior[idx] : null;
              const esActual = idx === mesActual && anioSel === anioActualStr;
              return (
                <div key={mes} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, opacity: esActual ? 1 : idx > mesActual && anioSel === anioActualStr ? 0.4 : 1 }}>
                  <span style={{ width: 32, fontSize: 12, fontWeight: esActual ? 700 : 400, color: esActual ? COLORS.recria : COLORS.textMuted, flexShrink: 0 }}>{mes}</span>
                  <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 3 }}>
                    {/* Barra año actual */}
                    <div style={{ height: 14, background: COLORS.bg, borderRadius: 7, overflow: "hidden", position: "relative" }}>
                      <div style={{ height: "100%", width: mmA > 0 ? Math.round((mmA / maxMm) * 100) + "%" : "2px", background: COLORS.recria, borderRadius: 7, transition: "width 0.3s" }} />
                    </div>
                    {/* Barra año anterior */}
                    {mmB !== null && (
                      <div style={{ height: 10, background: COLORS.bg, borderRadius: 5, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: mmB > 0 ? Math.round((mmB / maxMm) * 100) + "%" : "2px", background: COLORS.earth, opacity: 0.5, borderRadius: 5 }} />
                      </div>
                    )}
                  </div>
                  <div style={{ width: 52, textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: mmA > 0 ? COLORS.recria : COLORS.border }}>{mmA > 0 ? Math.round(mmA) + " mm" : "—"}</div>
                    {mmB !== null && mmB > 0 && <div style={{ fontSize: 10, color: COLORS.earth, opacity: 0.7 }}>{Math.round(mmB)} mm</div>}
                  </div>
                </div>
              );
            })}
            {mmAnterior && (
              <div style={{ display: "flex", gap: 16, marginTop: 10, paddingTop: 10, borderTop: "1px solid " + COLORS.border }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: COLORS.textMuted }}><div style={{ width: 14, height: 8, background: COLORS.recria, borderRadius: 4 }} />{anioSel}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: COLORS.textMuted }}><div style={{ width: 14, height: 8, background: COLORS.earth, opacity: 0.5, borderRadius: 4 }} />{anioSel2}</div>
              </div>
            )}
          </div>

          {/* Lista de eventos */}
          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textMuted, marginBottom: 10 }}>EVENTOS — {anioSel}</div>
          {lluviasEstab.filter(l => getMesAgri(l.fecha).anioAgri === anioSel).length === 0 && (
            <p style={{ color: COLORS.textMuted, fontSize: 13, fontStyle: "italic" }}>Sin eventos registrados para {anioSel}.</p>
          )}
          {[...lluviasEstab].filter(l => getMesAgri(l.fecha).anioAgri === anioSel).sort((a, b) => b.fecha.localeCompare(a.fecha)).map((l, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.recria, borderRadius: 6, marginBottom: 6 }}>
              <span style={{ fontSize: 14, color: COLORS.textMuted }}>{fmtFecha(l.fecha)}</span>
              <span style={{ fontWeight: 700, fontSize: 18, color: COLORS.recria }}>{l.mm} mm</span>
              <button onClick={() => setLluvias(prev => { const c = JSON.parse(JSON.stringify(prev)); c[estabId] = (c[estabId] || []).filter(x => x.id !== l.id); return c; })} style={{ background: "none", border: "1px solid #FECACA", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
            </div>
          ))}
        </div>

        {modalLluvia && (
          <Modal title="Registrar lluvia" onClose={() => setModalLluvia(false)}>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <DateInput label="Fecha" value={fl.fecha} onChange={v => setFl(p => ({ ...p, fecha: v }))} />
              <Input label="Milímetros" value={fl.mm} onChange={v => setFl(p => ({ ...p, mm: v }))} placeholder="ej. 32" />
              <div style={{ display: "flex", gap: 10 }}>
                <Btn onClick={() => { if (!fl.mm) return; agregarLluvia({ ...fl, id: "LL" + Date.now() }); setModalLluvia(false); setFl({ fecha: new Date().toISOString().split("T")[0], mm: "" }); }} disabled={!fl.mm}>Guardar</Btn>
                <Btn variant="ghost" onClick={() => setModalLluvia(false)}>Cancelar</Btn>
              </div>
            </div>
          </Modal>
        )}
      </div>
    );
  }

  if (vista === "resumen") {
    const cultNorte = (cultivos[estabId]?.norte || []).map(c => ({ ...c, pos: "Norte" }));
    const cultSur   = (cultivos[estabId]?.sur   || []).map(c => ({ ...c, pos: "Sur" }));
    const todos = [...cultNorte, ...cultSur];
    const anos = [...new Set(todos.map(c => c.fecha ? c.fecha.slice(0,4) : null).filter(Boolean))].sort((a,b) => b-a);
    const cultFiltrados = anioResumen === "todos" ? todos : todos.filter(c => c.fecha && c.fecha.startsWith(anioResumen));
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg }}>
        <div style={{ background: COLORS.earth, padding: "0 24px" }}>
          <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", gap: 10, height: 56 }}>
            <button onClick={() => setVista(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>&#8592;</button>
            <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>{estabNombre} &#8250; Resumen de campana</span>
          </div>
        </div>
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px" }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20, alignItems: "center" }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted }}>CAMPANA:</span>
            {["todos", ...anos].map(a => (
              <div key={a} onClick={() => setAnioResumen(a)} style={{ padding: "4px 12px", borderRadius: 14, fontSize: 13, fontWeight: 600, cursor: "pointer", background: anioResumen === a ? COLORS.earth : COLORS.bg, color: anioResumen === a ? "#fff" : COLORS.textMuted, border: "1px solid " + (anioResumen === a ? COLORS.earth : COLORS.border) }}>
                {a === "todos" ? "Todas" : a + "/" + String(Number(a)+1).slice(2)}
              </div>
            ))}
          </div>
          {cultFiltrados.length === 0 && <div style={{ color: COLORS.textMuted, padding: 32, textAlign: "center" }}>Sin cultivos para este periodo.</div>}
          {[...cultFiltrados].sort((a,b) => (b.fecha || "").localeCompare(a.fecha || "")).map((c, i) => {
            const ha = misHa[c.pos ? c.pos.toLowerCase() : ""];
            const cosecha = (c.labores || []).find(l => l.tipo === "cosecha") || (c.estado === "cosechado" ? { rinde: c.rinde, unidad: c.unidad, humedad: c.humedad } : null);
            const rindHa = cosecha && cosecha.rinde && ha ? (Number(cosecha.rinde) / Number(ha)).toFixed(1) : null;
            return (
              <div key={c.id || i} style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + (c.estado === "cosechado" ? COLORS.success : COLORS.earth), borderRadius: "0 8px 8px 0", padding: "14px 16px", marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{nombreCultivo(c)} <span style={{ fontSize: 12, fontWeight: 400, color: COLORS.textMuted }}>— Lote {c.pos}{c.sublote ? " · " + (c.sublote === "A" ? "Norte A" : c.sublote === "B" ? "Norte B" : c.sublote) : ""}</span></div>
                    <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 3 }}>
                      Sembrado: {fmtFecha(c.fecha)}{c.quienSembro ? " - " + c.quienSembro : ""}{ha ? " - " + ha + " ha" : ""}
                    </div>
                    {(c.componentes || []).map((comp, j) => (
                      <div key={j} style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 1 }}>
                        {comp.variedad ? comp.variedad : ""}{comp.empresa ? " - " + comp.empresa : ""}{comp.kgHa ? " - " + comp.kgHa + " kg/ha" : ""}
                      </div>
                    ))}
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 10, background: c.estado === "cosechado" ? "#D1FAE5" : "#FEF3C7", color: c.estado === "cosechado" ? COLORS.success : "#92400E" }}>
                    {c.estado === "cosechado" ? "Cosechado" : "En curso"}
                  </span>
                </div>
                {cosecha && (
                  <div style={{ marginTop: 10, padding: "8px 12px", background: "#F0FDF4", borderRadius: 6, display: "flex", gap: 16, flexWrap: "wrap" }}>
                    <div><span style={{ fontSize: 11, color: COLORS.textMuted }}>COSECHA</span><div style={{ fontWeight: 700, color: COLORS.success }}>{cosecha.rinde} {cosecha.unidad}</div></div>
                    {rindHa && <div><span style={{ fontSize: 11, color: COLORS.textMuted }}>RINDE/HA</span><div style={{ fontWeight: 700, color: COLORS.success }}>{rindHa} {cosecha.unidad}/ha</div></div>}
                    {cosecha.humedad && <div><span style={{ fontSize: 11, color: COLORS.textMuted }}>HUMEDAD</span><div style={{ fontWeight: 700 }}>{cosecha.humedad}%</div></div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: COLORS.earth, padding: "0 24px" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
          <button onClick={onVolver} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>&#8592;</button>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 18, fontWeight: 700, color: "#fff" }}>{estabNombre}</span>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: "0.05em" }}>AGRICOLA</span>
        </div>
      </div>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px" }}>
        <div style={{ display: "flex", gap: 40, alignItems: "flex-start", flexWrap: "wrap" }}>
          <CroquisCampo estab={estab} onLoteClick={(lote) => setVista(lote.pos)} cultivosNorte={cultivos[estabId]?.norte || []} />
          <div style={{ flex: 1, minWidth: 220 }}>
            {["norte","sur"].map(pos => {
              const resumen = nombreResumen(pos);
              const ha = misHa[pos];
              const editHa = pos === "norte" ? editHaNorte : editHaSur;
              const setEditHa = pos === "norte" ? setEditHaNorte : setEditHaSur;
              const haInput = pos === "norte" ? haInputNorte : haInputSur;
              const setHaInput = pos === "norte" ? setHaInputNorte : setHaInputSur;
              return (
                <div key={pos} style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.earth, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div onClick={() => setVista(pos)} style={{ flex: 1, cursor: "pointer" }}>
                      <div style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15, textTransform: "capitalize" }}>Lote {pos}</div>
                      {resumen ? <div style={{ fontSize: 13, color: COLORS.earth, fontWeight: 600, marginTop: 4 }}>{resumen}</div> : <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 4 }}>Sin cultivo activo</div>}
                      <div style={{ fontSize: 11, color: COLORS.earth, marginTop: 4 }}>Ver detalle &#8250;</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 10 }}>
                      {editHa ? (
                        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                          <input autoFocus type="number" value={haInput} onChange={e => setHaInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { setHa(pos, haInput); setEditHa(false); } if (e.key === "Escape") setEditHa(false); }} style={{ width: 60, border: "1px solid " + COLORS.earth, borderRadius: 4, padding: "3px 6px", fontSize: 13, textAlign: "right" }} />
                          <button onClick={() => { setHa(pos, haInput); setEditHa(false); }} style={{ background: COLORS.earth, color: "#fff", border: "none", borderRadius: 4, padding: "3px 7px", cursor: "pointer", fontSize: 11 }}>OK</button>
                        </div>
                      ) : (
                        <div onClick={() => { setEditHa(true); setHaInput(ha || ""); }} style={{ cursor: "pointer", borderBottom: "1px dashed " + COLORS.border }}>
                          {ha ? <span style={{ fontSize: 15, fontWeight: 700, color: COLORS.earth }}>{ha} ha</span> : <span style={{ fontSize: 11, color: COLORS.textMuted }}>+ ha</span>}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
            {(() => {
              // Combinar novedades + labores de cultivos de ambos lotes
              const ICON_LABOR = { siembra: "🌱", laboreo: "🚜", aplicacion: "💧", cosecha: "🌾" };
              const COLOR_LABOR = { siembra: COLORS.fieldGreen, laboreo: COLORS.earth, aplicacion: COLORS.recria, cosecha: COLORS.straw };
              const items = [...misNovedades.map(n => ({ fecha: n.fecha, icon: "📝", texto: n.texto, lote: n.lote, color: COLORS.earth }))];
              ["norte","sur"].forEach(pos => {
                const loteLabel = pos === "norte" ? "Norte" : "Sur";
                (cultivos[estabId]?.[pos] || []).forEach(c => {
                  const nombre = nombreCultivo(c);
                  // Siembra
                  if (c.fecha) items.push({ fecha: c.fecha, icon: "🌱", texto: "Siembra: " + nombre + (c.quienSembro ? " · " + c.quienSembro : ""), lote: loteLabel, color: COLORS.fieldGreen });
                  // Labores dentro del cultivo
                  (c.labores || []).forEach(l => {
                    let texto = "";
                    if (l.tipo === "cosecha") texto = "Cosecha: " + nombre + (l.rinde ? " · " + l.rinde + " " + (l.unidad || "") : "") + (l.humedad ? " · " + l.humedad + "% hum." : "");
                    else if (l.tipo === "aplicacion") texto = "Aplicación: " + (l.producto || l.descripcion || "");
                    else if (l.tipo === "laboreo") texto = "Laboreo: " + (l.descripcion || "");
                    if (texto) items.push({ fecha: l.fecha, icon: ICON_LABOR[l.tipo] || "📋", texto, lote: loteLabel, color: COLOR_LABOR[l.tipo] || COLORS.earth });
                  });
                });
              });
              items.sort((a,b) => (b.fecha || "").localeCompare(a.fecha || ""));

              return (
                <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.fieldGreen, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                  <div style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15, marginBottom: 10 }}>📝 Novedades de campo</div>
                  {items.length === 0 ? (
                    <div style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic" }}>Sin actividades registradas</div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 240, overflowY: "auto" }}>
                      {items.slice(0, 10).map((it, i) => (
                        <div key={i} style={{ borderLeft: "3px solid " + it.color, paddingLeft: 8 }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.textMuted }}>{it.icon} {fmtFecha(it.fecha)} · <span style={{ color: it.color }}>Lote {it.lote}</span></div>
                          <div style={{ fontSize: 13, color: COLORS.textPrimary, lineHeight: 1.4 }}>{it.texto}</div>
                        </div>
                      ))}
                      {items.length > 10 && <div style={{ fontSize: 11, color: COLORS.textMuted, fontStyle: "italic" }}>+{items.length - 10} más</div>}
                    </div>
                  )}
                </div>
              );
            })()}
            <div onClick={() => setVista("lluvias")} style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.recria, borderRadius: 8, padding: "14px 18px", marginBottom: 12, cursor: "pointer" }}>
              <div style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15 }}>Lluvias</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: COLORS.recria, fontFamily: "Georgia, serif", marginTop: 4 }}>{(lluvias[estabId] || []).reduce((s, l) => s + Number(l.mm), 0)} mm</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>{(lluvias[estabId] || []).length} eventos - Ver historial &#8250;</div>
            </div>
            <div onClick={() => setVista("resumen")} style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.straw, borderRadius: 8, padding: "14px 18px", cursor: "pointer" }}>
              <div style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15 }}>Resumen de campana</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>Siembras, cosechas y rendimientos &#8250;</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};
// ── Pantalla Principal ───────────────────────────────────────────
const LoteBtn = ({ pos, label, cultivos, onClick }) => {
  const cults = (cultivos || []).filter(c => c.estado === "activo" || c.actual);
  const nombre = cults.length > 0 ? cults.map(c => c.componentes?.[0]?.especie || nombreCultivo(c)).join(" + ") : "Sin siembra activa";
  const ultimaAp = (cultivos || []).flatMap(c => (c.labores || []).filter(l => l.tipo === "aplicacion")).sort((a,b) => b.fecha.localeCompare(a.fecha))[0];
  return (
    <div onClick={e => { e.stopPropagation(); onClick(); }} style={{ background: COLORS.bg, borderRadius: 8, padding: "10px 14px", border: "1.5px solid " + COLORS.border, cursor: "pointer", transition: "all 0.15s" }}
      onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.earth; e.currentTarget.style.background = "#FDF8F2"; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.border; e.currentTarget.style.background = COLORS.bg; }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.textMuted, letterSpacing: "0.07em", textTransform: "uppercase", marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 700, color: cults.length > 0 ? COLORS.earth : COLORS.textMuted }}>{nombre}</div>
      {ultimaAp && <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Última aplic.: {fmtFecha(ultimaAp.fecha)}</div>}
    </div>

};

const AgriCardBody = ({ estab, cultivos, onEntrar }) => {
  const estabCultivos = cultivos[estab.id] || {};
  const norteConf = estab.lotesCroquis?.find(l => l.pos === "norte");
  const norteCults = (estabCultivos.norte || []).filter(c => c.estado === "activo" || c.actual);
  const isSubdivided = norteConf?.subdividido && norteCults.some(c => c.sublote === "B");
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {isSubdivided ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {["A","B"].map(sub => {
            const cults = norteCults.filter(c => c.sublote === sub);
            const nombre = cults.length > 0 ? cults.map(c => c.componentes?.[0]?.especie || nombreCultivo(c)).join("+") : "—";
            return (
              <div key={sub} onClick={e => { e.stopPropagation(); onEntrar(estab.id, "norte"); }}
                style={{ background: COLORS.bg, borderRadius: 8, padding: "10px 14px", border: "1.5px solid " + COLORS.border, cursor: "pointer" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.earth; e.currentTarget.style.background = "#FDF8F2"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.border; e.currentTarget.style.background = COLORS.bg; }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.textMuted, letterSpacing: "0.07em", textTransform: "uppercase", marginBottom: 3 }}>Norte {sub}</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.earth }}>{nombre}</div>
              </div>
            );
          })}
        </div>
      ) : (
        <LoteBtn label="Norte" cultivos={estabCultivos.norte} onClick={() => onEntrar(estab.id, "norte")} />
      )}
      <LoteBtn label="Sur" cultivos={estabCultivos.sur} onClick={() => onEntrar(estab.id, "sur")} />
    </div>
  );
};

const PantallaInicio = ({ animales, lotes, recorridas, cultivos, lluvias, onEntrar }) => {
  const activos  = animales.filter(a => a.viva !== false);
  const vacas    = activos.filter(a => a.tipo === "vaca");
  const terneros = activos.filter(a => a.tipo === "ternero" || a.tipo === "ternera");
  const prenezPos = vacas.filter(a => { const ult = (a.eventos || []).filter(e => e.tipo === "preñez").sort((x, y) => y.fecha.localeCompare(x.fecha))[0]; return ult?.resultado === "positiva"; });
  const pctPrenez = vacas.length > 0 ? Math.round((prenezPos.length / vacas.length) * 100) : 0;
  const ultimaRecorrida = [...recorridas].sort((a, b) => b.fecha.localeCompare(a.fecha))[0];

  // Stats agrícolas en tiempo real
  const statsAgri = (estabId) => {
    const estabCultivos = cultivos[estabId] || {};
    const todos = [...(estabCultivos.norte || []), ...(estabCultivos.sur || [])];
    const cantActivos = todos.filter(c => c.estado === "activo" || c.actual).length;
    // Última aplicación: la más reciente entre todos los labores tipo "aplicacion"
    let ultimaFecha = null;
    todos.forEach(c => {
      (c.labores || []).filter(l => l.tipo === "aplicacion").forEach(l => {
        if (!ultimaFecha || l.fecha > ultimaFecha) ultimaFecha = l.fecha;
      });
    });
    // Lluvia año agrícola actual (julio-junio)
    const hoy = new Date();
    const anioInicio = hoy.getMonth() >= 6 ? hoy.getFullYear() : hoy.getFullYear() - 1;
    const desde = anioInicio + "-07-01";
    const lluviasEstab = lluvias[estabId] || [];
    const mmAnio = lluviasEstab.filter(l => l.fecha >= desde).reduce((s, l) => s + Number(l.mm || 0), 0);
    return [
      { label: "Cultivos activos", value: cantActivos || "—", color: COLORS.straw },
      { label: "Última aplicación", value: ultimaFecha ? fmtFecha(ultimaFecha) : "—", color: COLORS.sand },
      { label: "Lluvia año agrícola", value: mmAnio > 0 ? Math.round(mmAnio) + " mm" : "—", color: COLORS.recria },
    ];
  };

  const resumen = {
    manzanito:    [{ label: "Animales", value: activos.length, color: COLORS.fieldGreen }, { label: "Vacas", value: vacas.length, color: COLORS.cria }, { label: "% Preñez", value: pctPrenez + "%", color: pctPrenez >= 80 ? COLORS.success : COLORS.danger }, { label: "Terneros/as", value: terneros.length, color: COLORS.earth }],
    mariaisabel:   statsAgri("mariaisabel"),
    corraldepachi: statsAgri("corraldepachi"),
  };
  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: COLORS.fieldGreen, padding: "0 32px" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", height: 60, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 22, fontWeight: 700, color: "#fff" }}>El Talita S.R.L.</span>
          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Córdoba, Argentina</span>
        </div>
      </div>
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "36px 24px" }}>
        <div style={{ marginBottom: 28 }}>
          <h2 style={{ fontFamily: "Georgia, serif", fontSize: 20, color: COLORS.fieldGreen, margin: 0 }}>Mis establecimientos</h2>
          <p style={{ fontSize: 14, color: COLORS.textMuted, margin: "4px 0 0" }}>Hacé clic en un campo para ver el detalle</p>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 24 }}>
          {ESTABLECIMIENTOS.map(estab => (
            <div key={estab.id} onClick={() => onEntrar(estab.id)} style={{ background: COLORS.surface, border: `1.5px solid ${estab.tipo === "ganadero" ? COLORS.fieldGreen : COLORS.earth}`, borderRadius: 12, overflow: "hidden", cursor: "pointer", transition: "box-shadow 0.2s, transform 0.15s", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}
              onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 6px 24px rgba(0,0,0,0.13)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={e => { e.currentTarget.style.boxShadow = "0 1px 4px rgba(0,0,0,0.06)"; e.currentTarget.style.transform = "translateY(0)"; }}>
              <div style={{ background: estab.tipo === "ganadero" ? COLORS.fieldGreen : COLORS.earth, padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>{estab.nombre}</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginTop: 2, textTransform: "uppercase", letterSpacing: "0.06em" }}>{estab.tipo}</div>
                </div>
                <span style={{ fontSize: 11, fontWeight: 600, background: "rgba(255,255,255,0.15)", color: "#fff", padding: "3px 10px", borderRadius: 20 }}>● Activo</span>
              </div>
              <div style={{ height: 180, overflow: "hidden", position: "relative" }}>
                <img src={FOTOS[estab.id]} alt={estab.nombre} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.18) 100%)" }} />
              </div>
              <div style={{ padding: "10px 20px 18px" }}>
                {estab.tipo === "ganadero" ? (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                      {resumen[estab.id].map(s => (
                        <div key={s.label} style={{ background: COLORS.bg, borderRadius: 6, padding: "8px 12px", borderLeft: "3px solid " + s.color }}>
                          <div style={{ fontSize: 18, fontWeight: 700, color: s.color, fontFamily: "Georgia, serif" }}>{s.value}</div>
                          <div style={{ fontSize: 11, color: COLORS.textMuted }}>{s.label}</div>
                        </div>
                      ))}
                    </div>
                    {ultimaRecorrida && (
                      <div style={{ marginTop: 10, fontSize: 12, color: COLORS.textMuted, borderTop: "1px solid " + COLORS.border, paddingTop: 10 }}>
                        <span style={{ fontWeight: 600 }}>Última recorrida:</span> {fmtFecha(ultimaRecorrida.fecha)} · {ultimaRecorrida.texto.slice(0, 48)}{ultimaRecorrida.texto.length > 48 ? "…" : ""}
                      </div>
                    )}
                    <div style={{ marginTop: 10, textAlign: "right" }}>
                      <span style={{ fontSize: 12, color: COLORS.fieldGreen, fontWeight: 600 }}>Entrar →</span>
                    </div>
                  </>
                ) : (
                  <AgriCardBody estab={estab} cultivos={cultivos} onEntrar={onEntrar} />
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Modal: Cambio de actividad ───────────────────────────────────
const ModalCambioActividad = ({ animales, lotes, onSave, onClose }) => {
  const today = new Date().toISOString().split("T")[0];
  const [fecha, setFecha] = useState(today);
  const [actividadOrigen, setActividadOrigen] = useState("cria");
  const [actividadDestino, setActividadDestino] = useState("recria");
  const [tipoDestino, setTipoDestino] = useState("vaquillona");
  const [nota, setNota] = useState("");
  const [seleccionados, setSeleccionados] = useState([]);

  const animalesFiltrados = animales.filter(a => a.categoria === actividadOrigen);
  const toggle = (id) => setSeleccionados(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const tiposDestDisp = TIPO_POR_ACTIVIDAD[actividadDestino] || [];

  return (
    <Modal title="Cambio de actividad" onClose={onClose} wide>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
        <DateInput label="Fecha" value={fecha} onChange={setFecha} />
        <Select label="Actividad origen" value={actividadOrigen} onChange={v => { setActividadOrigen(v); setSeleccionados([]); }}
          options={[{ value: "cria", label: "Cría" }, { value: "recria", label: "Recría" }, { value: "engorde", label: "Engorde" }]} />
        <Select label="Actividad destino" value={actividadDestino} onChange={v => {
          setActividadDestino(v);
          setTipoDestino(TIPO_POR_ACTIVIDAD[v]?.[0]?.value || "");
        }} options={[{ value: "cria", label: "Cría" }, { value: "recria", label: "Recría" }, { value: "engorde", label: "Engorde" }].filter(o => o.value !== actividadOrigen)} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        <Select label="Categoría destino" value={tipoDestino} onChange={setTipoDestino} options={tiposDestDisp} />
        <Input label="Nota — opcional" value={nota} onChange={setNota} placeholder="ej. Reposición de madres, venta..." />
      </div>

      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 8 }}>
          SELECCIONÁ LOS ANIMALES ({animalesFiltrados.length} en {catLabel(actividadOrigen)})
        </div>
        {animalesFiltrados.length === 0 && <div style={{ color: COLORS.textMuted, fontSize: 13 }}>Sin animales en esta actividad.</div>}
        <div style={{ maxHeight: 220, overflowY: "auto", border: `1px solid ${COLORS.border}`, borderRadius: 6, padding: 8 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: 6 }}>
            {animalesFiltrados.map(a => {
              const lote = lotes.find(l => l.id === a.lote);
              const esel = seleccionados.includes(a.id);
              const isToro = esToro(a);
              return (
                <div key={a.id} onClick={() => toggle(a.id)} style={{
                  padding: "6px 10px", borderRadius: 5, cursor: "pointer", fontSize: 13, fontWeight: 600,
                  background: esel ? COLORS.fieldGreen : isToro ? "#FFF8E7" : COLORS.bg,
                  color: esel ? "#fff" : COLORS.textPrimary,
                  border: `1.5px solid ${esel ? COLORS.fieldGreen : isToro ? COLORS.straw : COLORS.border}`,
                }}>
                  {isToro ? "🐂" : "🐄"} {a.caravana}
                  {a.tipo && <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 400 }}>{tipoLabel(a.tipo)}</div>}
                  {lote && <div style={{ fontSize: 10, opacity: 0.6, fontWeight: 400 }}>{lote.nombre}</div>}
                </div>
              );
            })}
          </div>
        </div>
        {seleccionados.length > 0 && <div style={{ fontSize: 12, color: COLORS.fieldGreen, fontWeight: 600, marginTop: 8 }}>{seleccionados.length} seleccionados</div>}
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <Btn onClick={() => {
          if (!seleccionados.length || actividadOrigen === actividadDestino) return;
          onSave({ id: "CA" + Date.now(), fecha, actividadOrigen, actividadDestino, tipoDestino, nota, animalesIds: seleccionados });
        }} disabled={!seleccionados.length || actividadOrigen === actividadDestino}>
          Cambiar actividad
        </Btn>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
      </div>
    </Modal>
  );
};

const TIPO_GRUPOS = [
  { key: "toro",      label: "Toros",     abrev: "T",  icon: "🐂", color: COLORS.straw },
  { key: "vaca",      label: "Vacas",     abrev: "V",  icon: "🐄", color: COLORS.cria },
  { key: "vaquillona",label: "Vaquillonas",abrev:"Vr", icon: "🐄", color: COLORS.recria },
  { key: "torito",    label: "Toritos",   abrev: "Tr", icon: "🐂", color: COLORS.recria },
  { key: "ternero",   label: "Terneros",  abrev: "t",  icon: "🐮", color: COLORS.engorde },
  { key: "ternera",   label: "Terneras",  abrev: "t",  icon: "🐮", color: COLORS.engorde },
];

const VistaLoteDetalle = ({ lote, animales, movimientos, onVolver, onVerAnimal, onActualizarLote }) => {
  const [abiertos, setAbiertos] = useState({ toro: false, vaca: false, vaquillona: false, torito: false, ternero: false, ternera: false });
  const [editandoHa, setEditandoHa] = useState(false);
  const [haInput, setHaInput] = useState(lote.hectareas || "");
  const toggle = (k) => setAbiertos(p => ({ ...p, [k]: !p[k] }));
  const aniLote = animales.filter(a => a.lote === lote.id);

  // Dias pastoreando: desde el último movimiento hacia este lote
  const ultimaEntrada = (movimientos || [])
    .filter(m => m.loteDestino === lote.id)
    .sort((a, b) => b.fecha.localeCompare(a.fecha))[0];
  const diasPastoreando = ultimaEntrada
    ? Math.floor((new Date() - new Date(ultimaEntrada.fecha)) / (1000 * 60 * 60 * 24))
    : null;

  const guardarHa = () => {
    onActualizarLote?.({ ...lote, hectareas: haInput });
    setEditandoHa(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: "linear-gradient(135deg, " + COLORS.fieldGreen + " 0%, " + COLORS.fieldGreenLight + " 100%)", padding: "0 24px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
          <button onClick={onVolver} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>←</button>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>{lote.nombre}</span>
          <span style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", marginLeft: "auto" }}>{aniLote.length} animales</span>
        </div>
      </div>

      {/* Info del lote */}
      <div style={{ background: COLORS.surface, borderBottom: `1px solid ${COLORS.border}` }}>
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "14px 24px", display: "flex", gap: 32, alignItems: "center", flexWrap: "wrap" }}>
          {/* Hectáreas */}
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted }}>HECTÁREAS</span>
            {editandoHa ? (
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <input
                  autoFocus
                  value={haInput}
                  onChange={e => setHaInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") guardarHa(); if (e.key === "Escape") setEditandoHa(false); }}
                  style={{ width: 70, border: `1px solid ${COLORS.fieldGreen}`, borderRadius: 4, padding: "3px 7px", fontSize: 14, fontWeight: 700, outline: "none" }}
                  placeholder="ej. 120"
                  type="number"
                />
                <button onClick={guardarHa} style={{ background: COLORS.fieldGreen, color: "#fff", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12 }}>✓</button>
                <button onClick={() => setEditandoHa(false)} style={{ background: "none", border: `1px solid ${COLORS.border}`, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✕</button>
              </div>
            ) : (
              <span onClick={() => setEditandoHa(true)} style={{ fontSize: 18, fontWeight: 700, color: COLORS.earth, cursor: "pointer", borderBottom: `1px dashed ${COLORS.border}` }}>
                {lote.hectareas ? `${lote.hectareas} ha` : <span style={{ fontSize: 13, color: COLORS.textMuted, fontWeight: 400 }}>— agregar</span>}
              </span>
            )}
          </div>

          {/* Días pastoreando */}
          {aniLote.length > 0 && (
            <div>
              <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted }}>PASTOREANDO</span>
              <div style={{ fontSize: 18, fontWeight: 700, color: diasPastoreando !== null ? COLORS.fieldGreen : COLORS.textMuted, marginTop: 1 }}>
                {diasPastoreando !== null
                  ? diasPastoreando === 0 ? "Hoy" : diasPastoreando === 1 ? "1 día" : `${diasPastoreando} días`
                  : "—"}
              </div>
            </div>
          )}

          {/* Carga animal si hay hectáreas y animales */}
          {lote.hectareas && aniLote.length > 0 && (
            <div>
              <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted }}>CARGA</span>
              <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.earth, marginTop: 1 }}>
                {(aniLote.length / Number(lote.hectareas)).toFixed(1)} <span style={{ fontSize: 12, fontWeight: 400, color: COLORS.textMuted }}>cab/ha</span>
              </div>
            </div>
          )}
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px" }}>
        {aniLote.length === 0 && (
          <div style={{ textAlign: "center", color: COLORS.textMuted, padding: 48, fontSize: 14 }}>Sin animales en este lote</div>
        )}

        {TIPO_GRUPOS.map(grupo => {
          const animGrupo = aniLote.filter(a => a.tipo === grupo.key);
          if (animGrupo.length === 0) return null;
          const abierto = abiertos[grupo.key];
          return (
            <div key={grupo.key} style={{ marginBottom: 12 }}>
              {/* Header colapsable */}
              <div onClick={() => toggle(grupo.key)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: abierto ? "8px 8px 0 0" : 8, cursor: "pointer", userSelect: "none" }}>
                <span style={{ fontSize: 18 }}>{grupo.icon}</span>
                <span style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15, color: COLORS.earth }}>{grupo.label}</span>
                <span style={{ fontSize: 12, background: grupo.color, color: "#fff", padding: "1px 8px", borderRadius: 10, fontWeight: 700 }}>{animGrupo.length}</span>
                <span style={{ marginLeft: "auto", color: COLORS.textMuted, fontSize: 14 }}>{abierto ? "▲" : "▼"}</span>
              </div>

              {/* Lista desplegable */}
              {abierto && (
                <div style={{ border: `1px solid ${COLORS.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", overflow: "hidden" }}>
                  {animGrupo.map((a, i) => {
                    const ultPrenez = (a.eventos || []).filter(e => e.tipo === "preñez")[0];
                    const prenezColor = ultPrenez?.resultado === "positiva" ? COLORS.success : ultPrenez?.resultado === "negativa" ? COLORS.danger : COLORS.textMuted;
                    const prenezLabel = { positiva: "✓ PG", negativa: "✗ V", aborto: "⚠ Ab" }[ultPrenez?.resultado] || "—";
                    return (
                      <div key={a.id} onClick={() => onVerAnimal(a)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", background: i % 2 === 0 ? COLORS.surface : COLORS.bg, cursor: "pointer", borderTop: i > 0 ? `1px solid ${COLORS.border}` : "none" }}
                        onMouseEnter={e => e.currentTarget.style.background = "#EEF5E8"}
                        onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? COLORS.surface : COLORS.bg}>
                        <div style={{ width: 32, height: 32, borderRadius: "50%", background: grupo.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 11, flexShrink: 0 }}>
                          {a.tipo === "toro" || a.tipo === "torito" ? "🐂" : a.caravana.slice(-2)}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, fontSize: 14 }}>{a.caravana}</div>
                          {a.obs && <div style={{ fontSize: 11, color: "#856404" }}>{a.obs}</div>}
                        </div>
                        {ultPrenez && (
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: prenezColor }}>{prenezLabel}</div>
                            <div style={{ fontSize: 10, color: COLORS.textMuted }}>{fmtFecha(ultPrenez.fecha)}</div>
                          </div>
                        )}
                        <span style={{ color: COLORS.textMuted, fontSize: 13 }}>›</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── AplicacionCard: tarjeta editable del historial ──────────────
const AplicacionCard = ({ ap, animales, esVet, onActualizar, onEliminar }) => {
  const [abierto, setAbierto] = useState(false);
  const [editando, setEditando] = useState(false);
  const [confirmElim, setConfirmElim] = useState(false);
  const [form, setForm] = useState({ producto: ap.producto, descripcion: ap.descripcion || "", dosis: ap.dosis || "", unidad: ap.unidad || "ml", fecha: ap.fecha });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const guardar = () => { onActualizar({ ...ap, ...form }); setEditando(false); };

  return (
    <div style={{ marginBottom: 10, border: `1px solid ${COLORS.border}`, borderRadius: 8, overflow: "hidden" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "12px 16px", background: COLORS.surface, cursor: "pointer" }}>
        <div onClick={() => setAbierto(p => !p)} style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{ap.producto}{ap.dosis ? " · " + ap.dosis + " " + ap.unidad : ""}</div>
          {ap.descripcion && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 1 }}>{ap.descripcion}</div>}
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>{fmtFecha(ap.fecha)} · {ap.animalesIds?.length || 0} animales</div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <button onClick={() => { setEditando(p => !p); setAbierto(true); }} style={{ background: "none", border: "1px solid " + COLORS.border, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✏</button>
          {!confirmElim
            ? <button onClick={() => setConfirmElim(true)} style={{ background: "none", border: "1px solid #FECACA", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
            : <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => onEliminar(ap.id)} style={{ background: COLORS.danger, color: "#fff", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>Eliminar</button>
                <button onClick={() => setConfirmElim(false)} style={{ background: COLORS.border, border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11 }}>No</button>
              </div>
          }
          <button onClick={() => setAbierto(p => !p)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: COLORS.textMuted, padding: "3px 4px" }}>{abierto ? "▲" : "▼"}</button>
        </div>
      </div>

      {/* Formulario edición */}
      {editando && (
        <div style={{ padding: "12px 16px", background: "#F0FDF4", borderTop: "1px solid " + COLORS.border }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
            <Input label={esVet ? "Producto / Procedimiento" : "Producto"} value={form.producto} onChange={v => set("producto", v)} />
            <Input label="Dosis" value={form.dosis} onChange={v => set("dosis", v)} />
            <Select label="Unidad" value={form.unidad} onChange={v => set("unidad", v)} options={[{value:"ml",label:"ml"},{value:"cm3",label:"cm³"},{value:"g",label:"g"},{value:"comprimidos",label:"comp."},{value:"otro",label:"otro"}]} />
            <DateInput label="Fecha" value={form.fecha} onChange={v => set("fecha", v)} />
          </div>
          {esVet && <Input label="Descripción / Motivo" value={form.descripcion} onChange={v => set("descripcion", v)} style={{ marginBottom: 10 }} />}
          <div style={{ display: "flex", gap: 8 }}>
            <Btn small onClick={guardar} disabled={!form.producto.trim()}>Guardar cambios</Btn>
            <Btn small variant="ghost" onClick={() => setEditando(false)}>Cancelar</Btn>
          </div>
        </div>
      )}

      {/* Lista animales (colapsable) */}
      {abierto && !editando && (
        <div style={{ padding: "10px 16px", borderTop: "1px solid " + COLORS.border, background: COLORS.bg }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            {(ap.animalesIds || []).slice(0, 30).map(id => { const a = animales.find(x => x.id === id); return a ? <span key={id} style={{ fontSize: 11, background: COLORS.surface, border: "1px solid " + COLORS.border, borderRadius: 4, padding: "2px 6px" }}>{a.caravana}</span> : null; })}
            {(ap.animalesIds?.length || 0) > 30 && <span style={{ fontSize: 11, color: COLORS.textMuted }}>+{ap.animalesIds.length - 30} más</span>}
          </div>
        </div>
      )}
    </div>
  );
};

// ── Tareas: Vacunación / Veterinaria ────────────────────────────
const VistaAplicacion = ({ tipo, animales, lotes, aplicaciones, onSave, onActualizar, onEliminar, onVolver }) => {
  const hoy = new Date().toISOString().split("T")[0];
  const [vista, setVista] = useState("form");
  const [fecha, setFecha] = useState(hoy);
  const [producto, setProducto] = useState("");
  const [descripcion, setDescripcion] = useState("");
  const [dosis, setDosis] = useState("");
  const [unidad, setUnidad] = useState("ml");
  const [tab, setTab] = useState("rodeo");
  const [loteSelec, setLoteSelec] = useState(lotes[0]?.id || "");
  const [busqueda, setBusqueda] = useState("");
  const [seleccionados, setSeleccionados] = useState([]);
  const [gruposAb, setGruposAb] = useState({});

  const esVet = tipo === "veterinaria";
  const animActivos = animales.filter(a => a.viva !== false);
  const animFilt = animActivos.filter(a => {
    if (tab === "lote" && a.lote !== loteSelec) return false;
    if (busqueda && !a.caravana.toLowerCase().includes(busqueda.toLowerCase())) return false;
    return true;
  });
  const grupos = TIPO_GRUPOS.map(g => ({ ...g, animales: animFilt.filter(a => a.tipo === g.key) })).filter(g => g.animales.length > 0);

  const toggleA = (id) => setSeleccionados(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const toggleG = (g) => {
    const ids = g.animales.map(a => a.id);
    const todos = ids.every(id => seleccionados.includes(id));
    setSeleccionados(p => todos ? p.filter(id => !ids.includes(id)) : [...new Set([...p, ...ids])]);
  };
  const toggleAb = (k) => setGruposAb(p => ({ ...p, [k]: !p[k] }));

  const guardar = () => {
    if (!producto.trim() || !seleccionados.length) return;
    onSave({ id: (esVet ? "V" : "W") + Date.now(), tipo, fecha, producto: producto.trim(), descripcion: descripcion.trim(), dosis: dosis.trim(), unidad, animalesIds: seleccionados });
    setProducto(""); setDescripcion(""); setDosis(""); setSeleccionados([]);
  };

  const titulo = esVet ? "Veterinaria" : "Vacunación";
  const icon   = esVet ? "🩺" : "💉";

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: "linear-gradient(135deg, " + COLORS.fieldGreen + " 0%, " + COLORS.fieldGreenLight + " 100%)", padding: "0 24px" }}>
        <div style={{ maxWidth: 1000, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
          <button onClick={onVolver} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>←</button>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>{icon} {titulo}</span>
        </div>
      </div>

      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "20px 24px" }}>
        {/* Tabs visibles */}
        <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 8, overflow: "hidden", border: "1px solid " + COLORS.border, width: "fit-content" }}>
          {[{ id: "form", label: "+ Registrar" }, { id: "historial", label: "📋 Historial (" + aplicaciones.length + ")" }].map(t => (
            <button key={t.id} onClick={() => setVista(t.id)} style={{ padding: "8px 20px", fontSize: 13, fontWeight: 600, border: "none", borderRight: "1px solid " + COLORS.border, cursor: "pointer", background: vista === t.id ? COLORS.fieldGreen : COLORS.bg, color: vista === t.id ? "#fff" : COLORS.textMuted }}>
              {t.label}
            </button>
          ))}
        </div>
        {vista === "form" && (
          <>
            {/* Campos del producto */}
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 12, marginBottom: esVet ? 12 : 0 }}>
                <Input label={esVet ? "Producto / Procedimiento" : "Producto"} value={producto} onChange={setProducto} placeholder={esVet ? "ej. Ivermectina, Sutura..." : "ej. Aftosa, Brucelosis..."} />
                <Input label="Dosis" value={dosis} onChange={setDosis} placeholder="ej. 5" />
                <Select label="Unidad" value={unidad} onChange={setUnidad} options={[{value:"ml",label:"ml"},{value:"cm3",label:"cm³"},{value:"g",label:"g"},{value:"comprimidos",label:"comp."},{value:"otro",label:"otro"}]} />
                <DateInput label="Fecha" value={fecha} onChange={setFecha} />
              </div>
              {esVet && <Input label="Descripción / Motivo" value={descripcion} onChange={setDescripcion} placeholder="ej. Revisión podal, tratamiento herida..." />}
            </div>

            {/* Selector de animales */}
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 0, marginBottom: 12, borderRadius: 6, overflow: "hidden", border: `1px solid ${COLORS.border}`, width: "fit-content" }}>
                {["rodeo","lote"].map(t => (
                  <button key={t} onClick={() => setTab(t)} style={{ padding: "6px 18px", fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer", background: tab === t ? COLORS.fieldGreen : COLORS.bg, color: tab === t ? "#fff" : COLORS.textMuted }}>
                    {t === "rodeo" ? "🐄 Rodeo completo" : "🗺 Por lote"}
                  </button>
                ))}
              </div>
              {tab === "lote" && (
                <Select label="" value={loteSelec} onChange={setLoteSelec} options={lotes.map(l => ({ value: l.id, label: l.nombre }))} style={{ marginBottom: 10 }} />
              )}
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                <Input placeholder="🔍 Buscar caravana..." value={busqueda} onChange={setBusqueda} style={{ flex: 1 }} />
                <Btn small variant="ghost" onClick={() => setSeleccionados(animFilt.map(a => a.id))}>Todos</Btn>
                <Btn small variant="ghost" onClick={() => setSeleccionados([])}>Ninguno</Btn>
                <span style={{ fontSize: 12, color: COLORS.textMuted, whiteSpace: "nowrap" }}>{seleccionados.length} sel.</span>
              </div>
              <div style={{ maxHeight: 320, overflowY: "auto" }}>
                {grupos.map(g => {
                  const ab = gruposAb[g.key] !== false;
                  const ids = g.animales.map(a => a.id);
                  const todosG = ids.every(id => seleccionados.includes(id));
                  const algunoG = ids.some(id => seleccionados.includes(id));
                  return (
                    <div key={g.key} style={{ marginBottom: 6 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: COLORS.bg, borderRadius: ab ? "6px 6px 0 0" : 6, cursor: "pointer", border: `1px solid ${COLORS.border}` }}>
                        <div onClick={() => toggleG(g)} style={{ width: 16, height: 16, borderRadius: 3, border: `2px solid ${todosG ? COLORS.fieldGreen : algunoG ? COLORS.straw : COLORS.border}`, background: todosG ? COLORS.fieldGreen : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          {todosG && <span style={{ color: "#fff", fontSize: 10 }}>✓</span>}
                          {!todosG && algunoG && <span style={{ color: COLORS.straw, fontSize: 10 }}>−</span>}
                        </div>
                        <span onClick={() => toggleAb(g.key)} style={{ flex: 1, fontWeight: 700, fontSize: 13, color: COLORS.earth }}>{g.icon} {g.label}</span>
                        <span style={{ fontSize: 11, background: g.color, color: "#fff", padding: "1px 7px", borderRadius: 10, fontWeight: 700 }}>{g.animales.length}</span>
                        <span onClick={() => toggleAb(g.key)} style={{ color: COLORS.textMuted, fontSize: 12 }}>{ab ? "▲" : "▼"}</span>
                      </div>
                      {ab && (
                        <div style={{ border: `1px solid ${COLORS.border}`, borderTop: "none", borderRadius: "0 0 6px 6px", display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: 5, padding: "8px 10px" }}>
                          {g.animales.map(a => {
                            const sel = seleccionados.includes(a.id);
                            const ultimaAp = aplicaciones.filter(ap => ap.animalesIds?.includes(a.id)).sort((x, y) => y.fecha.localeCompare(x.fecha))[0];
                            return (
                              <div key={a.id} onClick={() => toggleA(a.id)} title={ultimaAp ? `Última: ${ultimaAp.producto} ${fmtFecha(ultimaAp.fecha)}` : ""} style={{ padding: "5px 7px", borderRadius: 5, cursor: "pointer", fontSize: 12, fontWeight: 600, background: sel ? COLORS.fieldGreen : COLORS.surface, color: sel ? "#fff" : COLORS.textPrimary, border: `1.5px solid ${sel ? COLORS.fieldGreen : COLORS.border}`, position: "relative" }}>
                                {a.caravana}
                                {ultimaAp && !sel && <span style={{ position: "absolute", top: 2, right: 3, width: 5, height: 5, borderRadius: "50%", background: COLORS.straw }} />}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
                {grupos.length === 0 && <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 12 }}>Sin animales</div>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn onClick={guardar} disabled={!producto.trim() || !seleccionados.length}>
                Guardar {tipo} ({seleccionados.length} animales)
              </Btn>
            </div>
          </>
        )}

        {vista === "historial" && (
          <div>
            {aplicaciones.length === 0 && <div style={{ color: COLORS.textMuted, padding: 32, textAlign: "center" }}>Sin registros aún.</div>}
            {[...aplicaciones].sort((a, b) => b.fecha.localeCompare(a.fecha)).map(ap => (
              <AplicacionCard key={ap.id} ap={ap} animales={animales} esVet={esVet}
                onActualizar={onActualizar} onEliminar={onEliminar} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

// ── EstructuralCard: tarjeta editable ───────────────────────────
const EstructuralCard = ({ e, lotes, onActualizar, onEliminar }) => {
  const [editando, setEditando] = useState(false);
  const [confirmElim, setConfirmElim] = useState(false);
  const cat = CATS_ESTRUCT.find(c => c.value === e.categoria) || CATS_ESTRUCT[4];
  const loteNombre = e.lote ? lotes.find(l => l.id === e.lote)?.nombre : null;
  const [form, setForm] = useState({ descripcion: e.descripcion || "", fecha: e.fecha, lote: e.lote || "", metros: e.metros || "", especie: e.especie || "", cantidad: e.cantidad || "" });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const guardar = () => { onActualizar({ ...e, ...form }); setEditando(false); };

  return (
    <div style={{ marginBottom: 8, border: "1px solid " + COLORS.border, borderRadius: 8, overflow: "hidden" }}>

            {e.metros && <span style={{ marginLeft: 8, fontWeight: 600, color: COLORS.fieldGreen }}>{e.metros} m</span>}
            {e.especie && <span style={{ marginLeft: 8 }}>🌱 {e.especie}{e.cantidad ? " · " + e.cantidad : ""}</span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
          <button onClick={() => setEditando(p => !p)} style={{ background: "none", border: "1px solid " + COLORS.border, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✏</button>
          {!confirmElim
            ? <button onClick={() => setConfirmElim(true)} style={{ background: "none", border: "1px solid #FECACA", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
            : <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => onEliminar(e.id)} style={{ background: COLORS.danger, color: "#fff", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>Eliminar</button>
                <button onClick={() => setConfirmElim(false)} style={{ background: COLORS.border, border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11 }}>No</button>
              </div>
          }
        </div>
      </div>
      {editando && (
        <div style={{ padding: "12px 14px", background: "#F0FDF4", borderTop: "1px solid " + COLORS.border }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10, marginBottom: 10 }}>
            <Input label="Descripción" value={form.descripcion} onChange={v => set("descripcion", v)} />
            <DateInput label="Fecha" value={form.fecha} onChange={v => set("fecha", v)} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: cat.metros || cat.exotica ? "1fr 1fr 1fr" : "1fr", gap: 10, marginBottom: 10 }}>
            <Select label="Sector / Lote" value={form.lote} onChange={v => set("lote", v)} options={[{ value: "", label: "— Sin especificar —" }, ...lotes.map(l => ({ value: l.id, label: l.nombre }))]} />
            {cat.metros && <Input label="Metros" value={form.metros} onChange={v => set("metros", v)} type="number" />}
            {cat.exotica && <Input label="Especie" value={form.especie} onChange={v => set("especie", v)} />}
            {cat.exotica && <Input label="Cantidad erradicada" value={form.cantidad} onChange={v => set("cantidad", v)} />}
          </div>
          <div style={{ display: "flex", gap: 8 }}>

      )}
