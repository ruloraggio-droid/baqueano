const AplicacionCard = ({ ap, animales, esVet, onActualizar, onEliminar }) => {
  const [abierto, setAbierto] = useState(false);
  const [editando, setEditando] = useState(false);
  const [confirmElim, setConfirmElim] = useState(false);
  const [form, setForm] = useState({ producto: ap.producto, descripcion: ap.descripcion || "", dosis: ap.dosis || "", unidad: ap.unidad || "ml", fecha: ap.fecha });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const guardar = () => { onActualizar({ ...ap, ...form }); setEditando(false); };

  return (
    <div style={{ marginBottom: 10, border: `1px solid ${COLORS.border}`, borderRadius: 8, overflow: "hidden" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "12px 16px", background: COLORS.surface, cursor: "pointer" }}>
        <div onClick={() => setAbierto(p => !p)} style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{ap.producto}{ap.dosis ? " · " + ap.dosis + " " + ap.unidad : ""}</div>
          {ap.descripcion && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 1 }}>{ap.descripcion}</div>}
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>{fmtFecha(ap.fecha)} · {ap.animalesIds?.length || 0} animales</div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <button onClick={() => { setEditando(p => !p); setAbierto(true); }} style={{ background: "none", border: "1px solid " + COLORS.border, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✏</button>
          {!confirmElim
            ? <button onClick={() => setConfirmElim(true)} style={{ background: "none", border: "1px solid #FECACA", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
            : <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => onEliminar(ap.id)} style={{ background: COLORS.danger, color: "#fff", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>Eliminar</button>
                <button onClick={() => setConfirmElim(false)} style={{ background: COLORS.border, border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11 }}>No</button>
              </div>
          }
          <button onClick={() => setAbierto(p => !p)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: COLORS.textMuted, padding: "3px 4px" }}>{abierto ? "▲" : "▼"}</button>
        </div>
      </div>

      {/* Formulario edición */}
      {editando && (
        <div style={{ padding: "12px 16px", background: "#F0FDF4", borderTop: "1px solid " + COLORS.border }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
            <Input label={esVet ? "Producto / Procedimiento" : "Producto"} value={form.producto} onChange={v => set("producto", v)} />
            <Input label="Dosis" value={form.dosis} onChange={v => set("dosis", v)} />
            <Select label="Unidad" value={form.unidad} onChange={v => set("unidad", v)} options={[{value:"ml",label:"ml"},{value:"cm3",label:"cm³"},{value:"g",label:"g"},{value:"comprimidos",label:"comp."},{value:"otro",label:"otro"}]} />
            <DateInput label="Fecha" value={form.fecha} onChange={v => set("fecha", v)} />
          </div>
          {esVet && <Input label="Descripción / Motivo" value={form.descripcion} onChange={v => set("descripcion", v)} style={{ marginBottom: 10 }} />}
          <div style={{ display: "flex", gap: 8 }}>
            <Btn small onClick={guardar} disabled={!form.producto.trim()}>Guardar cambios</Btn>
            <Btn small variant="ghost" onClick={() => setEditando(false)}>Cancelar</Btn>
          </div>
        </div>
      )}

      {/* Lista animales (colapsable) */}
      {abierto && !editando && (
        <div style={{ padding: "10px 16px", borderTop: "1px solid " + COLORS.border, background: COLORS.bg }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            {(ap.animalesIds || []).slice(0, 30).map(id => { const a = animales.find(x => x.id === id); return a ? <span key={id} style={{ fontSize: 11, background: COLORS.surface, border: "1px solid " + COLORS.border, borderRadius: 4, padding: "2px 6px" }}>{a.caravana}</span> : null; })}
            {(ap.animalesIds?.length || 0) > 30 && <span style={{ fontSize: 11, color: COLORS.textMuted }}>+{ap.animalesIds.length - 30} más</span>}
          </div>
        </div>
      )}
    </div>
  );
};

// ── Tareas: Vacunación / Veterinaria ────────────────────────────
const VistaAplicacion = ({ tipo, animales, lotes, aplicaciones, onSave, onActualizar, onEliminar, onVolver }) => {
  const hoy = new Date().toISOString().split("T")[0];
  const [vista, setVista] = useState("form");
  const [fecha, setFecha] = useState(hoy);
  const [producto, setProducto] = useState("");
  const [descripcion, setDescripcion] = useState("");
  const [dosis, setDosis] = useState("");
  const [unidad, setUnidad] = useState("ml");
  const [tab, setTab] = useState("rodeo");
  const [loteSelec, setLoteSelec] = useState(lotes[0]?.id || "");
  const [busqueda, setBusqueda] = useState("");
  const [seleccionados, setSeleccionados] = useState([]);
  const [gruposAb, setGruposAb] = useState({});

  const esVet = tipo === "veterinaria";
  const animActivos = animales.filter(a => a.viva !== false);
  const animFilt = animActivos.filter(a => {
    if (tab === "lote" && a.lote !== loteSelec) return false;
    if (busqueda && !a.caravana.toLowerCase().includes(busqueda.toLowerCase())) return false;
    return true;
  });
  const grupos = TIPO_GRUPOS.map(g => ({ ...g, animales: animFilt.filter(a => a.tipo === g.key) })).filter(g => g.animales.length > 0);

  const toggleA = (id) => setSeleccionados(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const toggleG = (g) => {
    const ids = g.animales.map(a => a.id);
    const todos = ids.every(id => seleccionados.includes(id));
    setSeleccionados(p => todos ? p.filter(id => !ids.includes(id)) : [...new Set([...p, ...ids])]);
  };
  const toggleAb = (k) => setGruposAb(p => ({ ...p, [k]: !p[k] }));

  const guardar = () => {
    if (!producto.trim() || !seleccionados.length) return;
    onSave({ id: (esVet ? "V" : "W") + Date.now(), tipo, fecha, producto: producto.trim(), descripcion: descripcion.trim(), dosis: dosis.trim(), unidad, animalesIds: seleccionados });
    setProducto(""); setDescripcion(""); setDosis(""); setSeleccionados([]);
  };

  const titulo = esVet ? "Veterinaria" : "Vacunación";
  const icon   = esVet ? "🩺" : "💉";

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: "linear-gradient(135deg, " + COLORS.fieldGreen + " 0%, " + COLORS.fieldGreenLight + " 100%)", padding: "0 24px" }}>
        <div style={{ maxWidth: 1000, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
          <button onClick={onVolver} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>←</button>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>{icon} {titulo}</span>
        </div>
      </div>

      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "20px 24px" }}>
        {/* Tabs visibles */}
        <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 8, overflow: "hidden", border: "1px solid " + COLORS.border, width: "fit-content" }}>
          {[{ id: "form", label: "+ Registrar" }, { id: "historial", label: "📋 Historial (" + aplicaciones.length + ")" }].map(t => (
            <button key={t.id} onClick={() => setVista(t.id)} style={{ padding: "8px 20px", fontSize: 13, fontWeight: 600, border: "none", borderRight: "1px solid " + COLORS.border, cursor: "pointer", background: vista === t.id ? COLORS.fieldGreen : COLORS.bg, color: vista === t.id ? "#fff" : COLORS.textMuted }}>
              {t.label}
            </button>
          ))}
        </div>
        {vista === "form" && (
          <>
            {/* Campos del producto */}
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 12, marginBottom: esVet ? 12 : 0 }}>
                <Input label={esVet ? "Producto / Procedimiento" : "Producto"} value={producto} onChange={setProducto} placeholder={esVet ? "ej. Ivermectina, Sutura..." : "ej. Aftosa, Brucelosis..."} />
                <Input label="Dosis" value={dosis} onChange={setDosis} placeholder="ej. 5" />
                <Select label="Unidad" value={unidad} onChange={setUnidad} options={[{value:"ml",label:"ml"},{value:"cm3",label:"cm³"},{value:"g",label:"g"},{value:"comprimidos",label:"comp."},{value:"otro",label:"otro"}]} />
                <DateInput label="Fecha" value={fecha} onChange={setFecha} />
              </div>
              {esVet && <Input label="Descripción / Motivo" value={descripcion} onChange={setDescripcion} placeholder="ej. Revisión podal, tratamiento herida..." />}
            </div>

            {/* Selector de animales */}
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 0, marginBottom: 12, borderRadius: 6, overflow: "hidden", border: `1px solid ${COLORS.border}`, width: "fit-content" }}>
                {["rodeo","lote"].map(t => (
                  <button key={t} onClick={() => setTab(t)} style={{ padding: "6px 18px", fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer", background: tab === t ? COLORS.fieldGreen : COLORS.bg, color: tab === t ? "#fff" : COLORS.textMuted }}>
                    {t === "rodeo" ? "🐄 Rodeo completo" : "🗺 Por lote"}
                  </button>
                ))}
              </div>
              {tab === "lote" && (
                <Select label="" value={loteSelec} onChange={setLoteSelec} options={lotes.map(l => ({ value: l.id, label: l.nombre }))} style={{ marginBottom: 10 }} />
              )}
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                <Input placeholder="🔍 Buscar caravana..." value={busqueda} onChange={setBusqueda} style={{ flex: 1 }} />
                <Btn small variant="ghost" onClick={() => setSeleccionados(animFilt.map(a => a.id))}>Todos</Btn>
                <Btn small variant="ghost" onClick={() => setSeleccionados([])}>Ninguno</Btn>
                <span style={{ fontSize: 12, color: COLORS.textMuted, whiteSpace: "nowrap" }}>{seleccionados.length} sel.</span>
              </div>
              <div style={{ maxHeight: 320, overflowY: "auto" }}>
                {grupos.map(g => {
                  const ab = gruposAb[g.key] !== false;
                  const ids = g.animales.map(a => a.id);
                  const todosG = ids.every(id => seleccionados.includes(id));
                  const algunoG = ids.some(id => seleccionados.includes(id));
                  return (
                    <div key={g.key} style={{ marginBottom: 6 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: COLORS.bg, borderRadius: ab ? "6px 6px 0 0" : 6, cursor: "pointer", border: `1px solid ${COLORS.border}` }}>
                        <div onClick={() => toggleG(g)} style={{ width: 16, height: 16, borderRadius: 3, border: `2px solid ${todosG ? COLORS.fieldGreen : algunoG ? COLORS.straw : COLORS.border}`, background: todosG ? COLORS.fieldGreen : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          {todosG && <span style={{ color: "#fff", fontSize: 10 }}>✓</span>}
                          {!todosG && algunoG && <span style={{ color: COLORS.straw, fontSize: 10 }}>−</span>}
                        </div>
                        <span onClick={() => toggleAb(g.key)} style={{ flex: 1, fontWeight: 700, fontSize: 13, color: COLORS.earth }}>{g.icon} {g.label}</span>
                        <span style={{ fontSize: 11, background: g.color, color: "#fff", padding: "1px 7px", borderRadius: 10, fontWeight: 700 }}>{g.animales.length}</span>
                        <span onClick={() => toggleAb(g.key)} style={{ color: COLORS.textMuted, fontSize: 12 }}>{ab ? "▲" : "▼"}</span>
                      </div>
                      {ab && (
                        <div style={{ border: `1px solid ${COLORS.border}`, borderTop: "none", borderRadius: "0 0 6px 6px", display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: 5, padding: "8px 10px" }}>
                          {g.animales.map(a => {
                            const sel = seleccionados.includes(a.id);
                            const ultimaAp = aplicaciones.filter(ap => ap.animalesIds?.includes(a.id)).sort((x, y) => y.fecha.localeCompare(x.fecha))[0];
                            return (
                              <div key={a.id} onClick={() => toggleA(a.id)} title={ultimaAp ? `Última: ${ultimaAp.producto} ${fmtFecha(ultimaAp.fecha)}` : ""} style={{ padding: "5px 7px", borderRadius: 5, cursor: "pointer", fontSize: 12, fontWeight: 600, background: sel ? COLORS.fieldGreen : COLORS.surface, color: sel ? "#fff" : COLORS.textPrimary, border: `1.5px solid ${sel ? COLORS.fieldGreen : COLORS.border}`, position: "relative" }}>
                                {a.caravana}
                                {ultimaAp && !sel && <span style={{ position: "absolute", top: 2, right: 3, width: 5, height: 5, borderRadius: "50%", background: COLORS.straw }} />}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
                {grupos.length === 0 && <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 12 }}>Sin animales</div>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn onClick={guardar} disabled={!producto.trim() || !seleccionados.length}>
                Guardar {tipo} ({seleccionados.length} animales)
              </Btn>
            </div>
          </>
        )}

        {vista === "historial" && (
          <div>
            {aplicaciones.length === 0 && <div style={{ color: COLORS.textMuted, padding: 32, textAlign: "center" }}>Sin registros aún.</div>}
            {[...aplicaciones].sort((a, b) => b.fecha.localeCompare(a.fecha)).map(ap => (
              <AplicacionCard key={ap.id} ap={ap} animales={animales} esVet={esVet}
                onActualizar={onActualizar} onEliminar={onEliminar} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

// ── EstructuralCard: tarjeta editable ───────────────────────────
const EstructuralCard = ({ e, lotes, onActualizar, onEliminar }) => {
  const [editando, setEditando] = useState(false);
  const [confirmElim, setConfirmElim] = useState(false);
  const cat = CATS_ESTRUCT.find(c => c.value === e.categoria) || CATS_ESTRUCT[4];
  const loteNombre = e.lote ? lotes.find(l => l.id === e.lote)?.nombre : null;
  const [form, setForm] = useState({ descripcion: e.descripcion || "", fecha: e.fecha, lote: e.lote || "", metros: e.metros || "", especie: e.especie || "", cantidad: e.cantidad || "" });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const guardar = () => { onActualizar({ ...e, ...form }); setEditando(false); };

  return (
    <div style={{ marginBottom: 8, border: "1px solid " + COLORS.border, borderRadius: 8, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "11px 14px", background: COLORS.surface }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{e.descripcion}</div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 3 }}>
            {fmtFecha(e.fecha)}
            {loteNombre && <span style={{ marginLeft: 8, fontWeight: 600, color: COLORS.earth }}>📍 {loteNombre}</span>}
            {e.metros && <span style={{ marginLeft: 8, fontWeight: 600, color: COLORS.fieldGreen }}>{e.metros} m</span>}
            {e.especie && <span style={{ marginLeft: 8 }}>🌱 {e.especie}{e.cantidad ? " · " + e.cantidad : ""}</span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
          <button onClick={() => setEditando(p => !p)} style={{ background: "none", border: "1px solid " + COLORS.border, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✏</button>
          {!confirmElim
            ? <button onClick={() => setConfirmElim(true)} style={{ background: "none", border: "1px solid #FECACA", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
            : <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => onEliminar(e.id)} style={{ background: COLORS.danger, color: "#fff", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>Eliminar</button>
                <button onClick={() => setConfirmElim(false)} style={{ background: COLORS.border, border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11 }}>No</button>
              </div>
          }
        </div>
      </div>
      {editando && (
        <div style={{ padding: "12px 14px", background: "#F0FDF4", borderTop: "1px solid " + COLORS.border }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10, marginBottom: 10 }}>
            <Input label="Descripción" value={form.descripcion} onChange={v => set("descripcion", v)} />
            <DateInput label="Fecha" value={form.fecha} onChange={v => set("fecha", v)} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: cat.metros || cat.exotica ? "1fr 1fr 1fr" : "1fr", gap: 10, marginBottom: 10 }}>
            <Select label="Sector / Lote" value={form.lote} onChange={v => set("lote", v)} options={[{ value: "", label: "— Sin especificar —" }, ...lotes.map(l => ({ value: l.id, label: l.nombre }))]} />
            {cat.metros && <Input label="Metros" value={form.metros} onChange={v => set("metros", v)} type="number" />}
            {cat.exotica && <Input label="Especie" value={form.especie} onChange={v => set("especie", v)} />}
            {cat.exotica && <Input label="Cantidad erradicada" value={form.cantidad} onChange={v => set("cantidad", v)} />}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn small onClick={guardar} disabled={!form.descripcion.trim()}>Guardar</Btn>
            <Btn small variant="ghost" onClick={() => setEditando(false)}>Cancelar</Btn>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Tareas: Estructurales ────────────────────────────────────────
const CATS_ESTRUCT = [
  { value: "picadas",    label: "Picadas",           icon: "🌿", metros: true  },
  { value: "alambrados", label: "Alambrados",         icon: "🔒", metros: true  },
  { value: "caminos",    label: "Caminos",            icon: "🛣", metros: true  },
  { value: "exoticas",   label: "Manejo de exóticas", icon: "🌱", exotica: true },
  { value: "otros",      label: "Otros",              icon: "🔧", metros: false },
];

const VistaEstructurales = ({ estructurales, lotes, onSave, onActualizar, onEliminar, onVolver }) => {
  const [vista, setVista] = useState("form");
  const [mostrarForm, setMostrarForm] = useState(false);
  const [categoria, setCategoria] = useState("picadas");
  const [fecha, setFecha] = useState(new Date().toISOString().split("T")[0]);
  const [descripcion, setDescripcion] = useState("");
  const [loteSelec, setLoteSelec] = useState("");
  const [metros, setMetros] = useState("");
  const [especie, setEspecie] = useState("");
  const [cantidad, setCantidad] = useState("");

  const cat = CATS_ESTRUCT.find(c => c.value === categoria);

  const guardar = () => {
    if (!descripcion.trim()) return;
    onSave({ id: "E" + Date.now(), fecha, categoria, descripcion: descripcion.trim(), lote: loteSelec || null, metros: cat.metros ? metros : undefined, especie: cat.exotica ? especie : undefined, cantidad: cat.exotica ? cantidad : undefined });
    setDescripcion(""); setMetros(""); setEspecie(""); setCantidad(""); setLoteSelec("");
    setMostrarForm(false);
  };

  // Resumen acumulado
  const totalMetros = (cat_val) => estructurales.filter(e => e.categoria === cat_val && e.metros).reduce((s, e) => s + Number(e.metros || 0), 0);
  const especiesMap = {};
  estructurales.filter(e => e.categoria === "exoticas" && e.especie).forEach(e => {
    const k = e.especie.trim();
    especiesMap[k] = (especiesMap[k] || 0) + Number(e.cantidad || 0);
  });

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: "linear-gradient(135deg, " + COLORS.fieldGreen + " 0%, " + COLORS.fieldGreenLight + " 100%)", padding: "0 24px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
          <button onClick={onVolver} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>←</button>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>🔧 Estructurales</span>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px" }}>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 8, overflow: "hidden", border: "1px solid " + COLORS.border, width: "fit-content" }}>
          {[{ id: "form", label: "+ Registrar" }, { id: "resumen", label: "📊 Resumen" }, { id: "historial", label: "📋 Historial (" + estructurales.length + ")" }].map(t => (
            <button key={t.id} onClick={() => setVista(t.id)} style={{ padding: "8px 18px", fontSize: 13, fontWeight: 600, border: "none", borderRight: "1px solid " + COLORS.border, cursor: "pointer", background: vista === t.id ? COLORS.fieldGreen : COLORS.bg, color: vista === t.id ? "#fff" : COLORS.textMuted }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Formulario */}
        {vista === "form" && (
          <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderRadius: 10, padding: 18 }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
              {CATS_ESTRUCT.map(c => (
                <div key={c.value} onClick={() => setCategoria(c.value)} style={{ padding: "7px 14px", borderRadius: 20, border: "2px solid " + (categoria === c.value ? COLORS.fieldGreen : COLORS.border), background: categoria === c.value ? "#EEF5E8" : COLORS.bg, cursor: "pointer", fontSize: 13, fontWeight: 600, color: categoria === c.value ? COLORS.fieldGreen : COLORS.textMuted }}>
                  {c.icon} {c.label}
                </div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12, marginBottom: 12 }}>
              <Input label="Descripción" value={descripcion} onChange={setDescripcion} placeholder={cat.exotica ? "ej. Control de ligustro en lote norte" : cat.value === "otros" ? "ej. Reparación manga" : "ej. Apertura picada perimetral sur"} />
              <DateInput label="Fecha" value={fecha} onChange={setFecha} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: cat.metros || cat.exotica ? "1fr 1fr 1fr" : "1fr", gap: 12, marginBottom: 12 }}>
              <Select label="Sector / Lote" value={loteSelec} onChange={setLoteSelec} options={[{ value: "", label: "— Sin especificar —" }, ...lotes.map(l => ({ value: l.id, label: l.nombre }))]} />
              {cat.metros && <Input label="Metros avanzados" value={metros} onChange={setMetros} placeholder="ej. 350" type="number" />}
              {cat.exotica && <Input label="Especie" value={especie} onChange={setEspecie} placeholder="ej. Ligustro, Mora..." />}
              {cat.exotica && <Input label="Cantidad erradicada" value={cantidad} onChange={setCantidad} placeholder="ej. 80 plantas" />}
            </div>
            <Btn onClick={guardar} disabled={!descripcion.trim()}>Guardar trabajo</Btn>
          </div>
        )}

        {/* Resumen acumulado */}
        {vista === "resumen" && (
          <div>
            {estructurales.length === 0 && <div style={{ color: COLORS.textMuted, padding: 32, textAlign: "center" }}>Sin trabajos registrados aún.</div>}
            {/* Metros por categoría */}
            {["picadas","alambrados","caminos"].map(cat_val => {
              const cat_info = CATS_ESTRUCT.find(c => c.value === cat_val);
              const total = totalMetros(cat_val);
              const registros = estructurales.filter(e => e.categoria === cat_val);
              if (!registros.length) return null;
              return (
                <div key={cat_val} style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.fieldGreen, borderRadius: "0 8px 8px 0", padding: "14px 16px", marginBottom: 12 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{cat_info.icon} {cat_info.label}</div>
                  <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.fieldGreen, margin: "6px 0 2px" }}>{total.toLocaleString("es-AR")} m</div>
                  <div style={{ fontSize: 12, color: COLORS.textMuted }}>{registros.length} {registros.length === 1 ? "trabajo" : "trabajos"} registrados</div>
                </div>
              );
            })}
            {/* Exóticas por especie */}
            {Object.keys(especiesMap).length > 0 && (
              <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid #16a34a", borderRadius: "0 8px 8px 0", padding: "14px 16px", marginBottom: 12 }}>
                <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>🌱 Manejo de exóticas</div>
                {Object.entries(especiesMap).map(([esp, cant]) => (
                  <div key={esp} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid " + COLORS.border, fontSize: 14 }}>
                    <span>{esp}</span>
                    <span style={{ fontWeight: 700, color: "#16a34a" }}>{cant ? cant.toLocaleString("es-AR") : "—"} erradicadas</span>
                  </div>
                ))}
              </div>
            )}
            {/* Otros */}
            {estructurales.filter(e => e.categoria === "otros").length > 0 && (
              <div style={{ background: COLORS.surface, border: "1px solid " + COLORS.border, borderLeft: "4px solid " + COLORS.earth, borderRadius: "0 8px 8px 0", padding: "14px 16px", marginBottom: 12 }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>🔧 Otros</div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>{estructurales.filter(e => e.categoria === "otros").length} trabajos</div>
              </div>
            )}
          </div>
        )}

        {/* Historial editable agrupado por categoría */}
        {vista === "historial" && (
          <div>
            {estructurales.length === 0 && <div style={{ color: COLORS.textMuted, padding: 32, textAlign: "center" }}>Sin trabajos registrados.</div>}
            {CATS_ESTRUCT.map(c => {
              const items = estructurales.filter(e => e.categoria === c.value).sort((a, b) => b.fecha.localeCompare(a.fecha));
              if (!items.length) return null;
              const totalM = c.metros ? items.reduce((s, e) => s + Number(e.metros || 0), 0) : null;
              return (
                <div key={c.value} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: COLORS.earth }}>{c.icon} {c.label}</span>
                    {totalM !== null && totalM > 0 && <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.fieldGreen }}>{totalM.toLocaleString("es-AR")} m total</span>}
                  </div>
                  {items.map(e => (
                    <EstructuralCard key={e.id} e={e} lotes={lotes}
                      onActualizar={onActualizar}
                      onEliminar={onEliminar} />
                  ))}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

// ── Historial: tarjeta de movimiento colapsable ─────────────────
const MovimientoCard = ({ m, origen, destino, animales, lotes, onEditar, onEliminar }) => {

  const [confirmElim, setConfirmElim] = useState(false);

    onEditar({ ...m, fecha });
    setEditando(false);
  };

  return (
    <div style={{ marginBottom: 10, border: `1px solid ${COLORS.border}`, borderRadius: 8, overflow: "hidden" }}>
      {/* Header siempre visible */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: COLORS.surface, cursor: "pointer" }}>
        <div onClick={() => setAbierto(p => !p)} style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{origen?.nombre || "—"} → {destino?.nombre || "—"}</div>
          {!editando && (
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{fmtFecha(m.fecha)} · {m.animalesIds.length} animales</div>
          )}
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <button onClick={() => { setEditando(p => !p); setAbierto(true); }} style={{ background: "none", border: `1px solid ${COLORS.border}`, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✏</button>
          {!confirmElim
            ? <button onClick={() => setConfirmElim(true)} style={{ background: "none", border: `1px solid #FECACA`, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
            : <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => onEliminar(m.id)} style={{ background: COLORS.danger, color: "#fff", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>Eliminar</button>
                <button onClick={() => setConfirmElim(false)} style={{ background: COLORS.border, border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 11 }}>No</button>
              </div>
          }
          <button onClick={() => setAbierto(p => !p)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: COLORS.textMuted, padding: "3px 6px" }}>{abierto ? "▲" : "▼"}</button>
        </div>
      </div>

      {/* Edición de fecha */}
      {editando && (
        <div style={{ padding: "10px 16px", background: "#F0FDF4", borderTop: `1px solid ${COLORS.border}`, display: "flex", gap: 10, alignItems: "flex-end" }}>
          <DateInput label="Fecha del movimiento" value={fecha} onChange={setFecha} />
          <Btn small onClick={guardar}>Guardar</Btn>
          <Btn small variant="ghost" onClick={() => setEditando(false)}>Cancelar</Btn>
        </div>
      )}

      {/* Lista de animales (colapsable) */}
      {abierto && (
        <div style={{ padding: "10px 16px", borderTop: `1px solid ${COLORS.border}`, background: COLORS.bg }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            {m.animalesIds.map(id => {
              const a = animales.find(x => x.id === id);
              return a ? <span key={id} style={{ fontSize: 11, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 4, padding: "2px 6px" }}>🐄 {a.caravana}</span> : null;
            })}
          </div>
        </div>

    </div>
  );
};

// ── Mes colapsable (Intervenidos / Vacunados) ────────────────────

};

// ── Rodeo: grupo colapsable por tipo ────────────────────────────
const RodeoGrupo = ({ grupo, lotes, onVerAnimal, modoSel, seleccionados, onToggle }) => {
  const [abierto, setAbierto] = useState(false);
  const ids = grupo.animales.map(a => a.id);
  const todosGrupo = ids.every(id => seleccionados?.has(id));
  const algunoGrupo = ids.some(id => seleccionados?.has(id));

  const toggleGrupo = (e) => {
    e.stopPropagation();
    ids.forEach(id => onToggle(id, !todosGrupo));
  };

  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 16px", background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: abierto ? "8px 8px 0 0" : 8, cursor: "pointer", userSelect: "none" }}>
        {modoSel && (
          <div onClick={toggleGrupo} style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${todosGrupo ? COLORS.fieldGreen : algunoGrupo ? COLORS.straw : COLORS.border}`, background: todosGrupo ? COLORS.fieldGreen : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            {todosGrupo && <span style={{ color: "#fff", fontSize: 11, lineHeight: 1 }}>✓</span>}
            {!todosGrupo && algunoGrupo && <span style={{ color: COLORS.straw, fontSize: 11, lineHeight: 1 }}>−</span>}
          </div>
        )}
        <span onClick={() => setAbierto(p => !p)} style={{ fontSize: 18 }}>{grupo.icon}</span>
        <span onClick={() => setAbierto(p => !p)} style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15, color: COLORS.earth, flex: 1 }}>{grupo.label}</span>
        <span style={{ fontSize: 12, background: grupo.color, color: "#fff", padding: "1px 8px", borderRadius: 10, fontWeight: 700 }}>{grupo.animales.length}</span>
        <span onClick={() => setAbierto(p => !p)} style={{ color: COLORS.textMuted, fontSize: 13 }}>{abierto ? "▲" : "▼"}</span>
      </div>
      {abierto && (
        <div style={{ border: `1px solid ${COLORS.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", overflow: "hidden" }}>
          {grupo.animales.map((a, i) => {
            const lote = lotes.find(l => l.id === a.lote);
            const ultPrenez = (a.eventos || []).filter(e => e.tipo === "preñez")[0];
            const prenezColor = ultPrenez?.resultado === "positiva" ? COLORS.success : ultPrenez?.resultado === "negativa" ? COLORS.danger : COLORS.textMuted;
            const prenezLabel = { positiva: "✓", negativa: "✗", aborto: "⚠" }[ultPrenez?.resultado] || "";
            const esSel = seleccionados?.has(a.id);
            return (
              <div key={a.id}
                onClick={() => modoSel ? onToggle(a.id, !esSel) : onVerAnimal(a)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", background: esSel ? "#EEF5E8" : i % 2 === 0 ? COLORS.surface : COLORS.bg, cursor: "pointer", borderTop: i > 0 ? `1px solid ${COLORS.border}` : "none" }}>
                {modoSel && (
                  <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${esSel ? COLORS.fieldGreen : COLORS.border}`, background: esSel ? COLORS.fieldGreen : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    {esSel && <span style={{ color: "#fff", fontSize: 11, lineHeight: 1 }}>✓</span>}
                  </div>
                )}
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: esToro(a) ? COLORS.straw : grupo.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 11, flexShrink: 0 }}>
                  {esToro(a) ? "🐂" : a.caravana.slice(-2)}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{a.caravana}</div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>{lote?.nombre || "—"}</div>
                </div>
                {!modoSel && ultPrenez && <span style={{ fontSize: 13, fontWeight: 700, color: prenezColor }}>{prenezLabel}</span>}
                {!modoSel && <span style={{ color: COLORS.textMuted, fontSize: 13 }}>›</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ── Vista Manzanito ──────────────────────────────────────────────
const VistaManzanito = ({ animales, setAnimales, lotes, setLotes, juntadas, setJuntadas, recorridas, setRecorridas, movimientos, setMovimientos, vacunaciones, setVacunaciones, veterinaria, setVeterinaria, estructurales, setEstructurales, eventosRodeo, setEventosRodeo, onVolver, showToast }) => {
  const [seccion, setSeccion] = useState(null);
  const [filtrocat, setFiltrocat] = useState("todas");
  const [filtrolote, setFiltrolote] = useState("todos");
  const [busqueda, setBusqueda] = useState("");
  const [modal, setModal] = useState(null);
  const [animalSel, setAnimalSel] = useState(null);
  const [loteViendo, setLoteViendo] = useState(null);
  const [tareasVista, setTareasVista] = useState(null); // null | "hub" | "juntadas" | "vacunacion" | "veterinaria" | "estructurales"
  const [tabRodeo, setTabRodeo] = useState("lista");
  const [anioIntervenciones, setAnioIntervenciones] = useState("todos");
  const [anioVacunados, setAnioVacunados] = useState("todos");
  const [modoSel, setModoSel] = useState(false);
  const [selBatch, setSelBatch] = useState(new Set());
  const [batchTipo, setBatchTipo] = useState("vaquillona");
  const [batchActividad, setBatchActividad] = useState("recria");
  const [mostrarFormBatch, setMostrarFormBatch] = useState(false);

  const toggleSelAnimal = (id, valor) => setSelBatch(prev => { const s = new Set(prev); valor ? s.add(id) : s.delete(id); return s; });
  const salirModoSel = () => { setModoSel(false); setSelBatch(new Set()); setMostrarFormBatch(false); };

  const animalesFiltrados = useMemo(() => animales.filter(a => {
    if (a.viva === false) return false;
    if (filtrocat !== "todas" && a.categoria !== filtrocat) return false;
    if (filtrolote !== "todos" && a.lote !== filtrolote) return false;
    if (busqueda && !a.caravana.toLowerCase().includes(busqueda.toLowerCase())) return false;
    return true;
  }), [animales, filtrocat, filtrolote, busqueda]);

  const activos   = animales.filter(a => a.viva !== false);
  const vacas     = activos.filter(a => a.tipo === "vaca");
  const prenezPos = vacas.filter(a => { const ult = (a.eventos || []).filter(e => e.tipo === "preñez").sort((x, y) => y.fecha.localeCompare(x.fecha))[0]; return ult?.resultado === "positiva"; });
  const pctPrenez = vacas.length > 0 ? Math.round((prenezPos.length / vacas.length) * 100) : 0;

  const logEvento = (texto, fecha) => setEventosRodeo(prev => [{ id: "ER" + Date.now(), fecha: fecha || new Date().toISOString().split("T")[0], texto }, ...prev]);

  const aplicarCambioActividad = (cambio) => {
    setAnimales(prev => prev.map(a =>
      cambio.animalesIds.includes(a.id)
        ? { ...a, categoria: cambio.actividadDestino, tipo: cambio.tipoDestino }
        : a
    ));
    const loteOrig = lotes.find(l => l.id === cambio.loteOrigen);
    logEvento("Cambio de actividad: " + cambio.animalesIds.length + " animales (" + tipoLabel(cambio.tipoDestino) + " / " + catLabel(cambio.actividadDestino) + ")" + (loteOrig ? " — " + loteOrig.nombre : ""));
    showToast("✓ " + cambio.animalesIds.length + " animales cambiados a " + catLabel(cambio.actividadDestino));
    setModal(null);
  };

  const aplicarMovimiento = (mov) => {
    setAnimales(prev => prev.map(a => mov.animalesIds.includes(a.id) ? { ...a, lote: mov.loteDestino } : a));
    setMovimientos(prev => [mov, ...prev]);
    const origen = lotes.find(l => l.id === mov.loteOrigen);
    const destino = lotes.find(l => l.id === mov.loteDestino);
    logEvento("Movimiento: " + mov.animalesIds.length + " animales de " + (origen?.nombre || "—") + " a " + (destino?.nombre || "—"), mov.fecha);
    showToast("✓ " + mov.animalesIds.length + " animales movidos");
    setModal(null);
  };

  const aplicarDestete = () => {
    const hoy = new Date().toISOString().split("T")[0];
    const terneras = animales.filter(a => a.tipo === "ternera" && a.viva !== false);
    const terneros = animales.filter(a => a.tipo === "ternero" && a.viva !== false);
    if (!terneras.length && !terneros.length) { showToast("Sin terneros/as para destetar"); return; }
    setAnimales(prev => prev.map(a => {
      if (a.tipo === "ternera" && a.viva !== false) return { ...a, tipo: "vaquillona", categoria: "recria" };
      if (a.tipo === "ternero" && a.viva !== false) return { ...a, tipo: "torito",    categoria: "recria" };
      return a;
    }));
    const partes = [];
    if (terneras.length) partes.push(terneras.length + " terneras → Vaquillona/Recría");
    if (terneros.length) partes.push(terneros.length + " terneros → Torito/Recría");
    logEvento("Destete: " + partes.join(", "), hoy);
    showToast("✓ Destete aplicado — " + (terneras.length + terneros.length) + " animales");
    setModal(null);
  };

  const seccionLabel = { rodeo: "Rodeo", lotes: "Lotes", histMovimientos: "Movimientos" };

  // Early return DESPUÉS de todos los hooks
  if (loteViendo) return (
    <VistaLoteDetalle
      lote={loteViendo}
      animales={animales}
      movimientos={movimientos}
      onVolver={() => setLoteViendo(null)}
      onVerAnimal={(a) => { setAnimalSel(a); setModal("animal"); setLoteViendo(null); setSeccion("rodeo"); }}
      onActualizarLote={(loteActualizado) => {
        setLotes(prev => prev.map(l => l.id === loteActualizado.id ? loteActualizado : l));
        setLoteViendo(loteActualizado);
      }}
    />
  );

  if (tareasVista === "hub") return (
    <VistaTareas juntadas={juntadas} vacunaciones={vacunaciones} veterinaria={veterinaria} estructurales={estructurales}
      onIr={(v) => setTareasVista(v)} onVolver={() => setTareasVista(null)} />
  );
  if (tareasVista === "juntadas") return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <div style={{ background: "linear-gradient(135deg, " + COLORS.fieldGreen + " 0%, " + COLORS.fieldGreenLight + " 100%)", padding: "0 24px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
          <button onClick={() => setTareasVista("hub")} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.7)", fontSize: 20 }}>←</button>
          <span style={{ fontFamily: "Georgia, serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>📋 Juntadas</span>
        </div>
      </div>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px" }}>
        <VistaJuntada animales={animales} juntadas={juntadas}
          onSave={(j) => { setJuntadas(p => [...p, j]); showToast("✓ Juntada guardada"); }}

  if (tareasVista === "veterinaria") return (
    <VistaAplicacion tipo="veterinaria" animales={animales} lotes={lotes} aplicaciones={veterinaria}

      onActualizar={(a) => { setVeterinaria(p => p.map(x => x.id === a.id ? a : x)); showToast("✓ Registro actualizado"); }}
      onEliminar={(id) => { setVeterinaria(p => p.filter(x => x.id !== id)); showToast("✓ Registro eliminado"); }}

              const CATS_MAP = { picadas:"🌿", alambrados:"🔒", caminos:"🛣", exoticas:"🌱", otros:"🔧" };
              const items = [
                ...(recorridas || []).map(r => ({ fecha: r.fecha, icon: "📝", texto: r.texto, color: COLORS.earth })),
                ...(eventosRodeo || []).map(e => ({ fecha: e.fecha, icon: "🐄", texto: e.texto, color: COLORS.fieldGreen })),
                ...(vacunaciones || []).map(v => ({ fecha: v.fecha, icon: "💉", texto: "Vacunación: " + v.producto + (v.dosis ? " " + v.dosis + v.unidad : "") + " · " + (v.animalesIds?.length || 0) + " animales", color: COLORS.recria })),
                ...(veterinaria  || []).map(v => ({ fecha: v.fecha, icon: "🩺", texto: "Veterinaria: " + v.producto + (v.descripcion ? " — " + v.descripcion : "") + " · " + (v.animalesIds?.length || 0) + " animales", color: "#7A3B6A" })),
                ...(juntadas || []).map(j => { const vino = Object.values(j.animales || {}).filter(x => x === "vino").length; const falta = Object.values(j.animales || {}).filter(x => x === "falta").length; return { fecha: j.fecha, icon: "📋", texto: "Juntada: " + vino + " presentes" + (falta > 0 ? ", " + falta + " faltaron" : ""), color: COLORS.straw }; }),

                <button key={t.id} onClick={() => setTabRodeo(t.id)} style={{ padding: "7px 16px", fontSize: 13, fontWeight: 600, border: "none", borderRight: `1px solid ${COLORS.border}`, cursor: "pointer", background: tabRodeo === t.id ? COLORS.fieldGreen : COLORS.bg, color: tabRodeo === t.id ? "#fff" : COLORS.textMuted, whiteSpace: "nowrap" }}>
                  {t.label}
                </button>
              ))}
            </div>

            {tabRodeo === "lista" && (
              <>

                  {!modoSel
                    ? <Btn small variant="ghost" onClick={() => setModoSel(true)}>☑ Seleccionar</Btn>
                    : <Btn small variant="ghost" onClick={salirModoSel}>✕ Cancelar</Btn>
                  }
                  <Btn onClick={() => setModal("nuevoAnimal")}>+ Animal</Btn>
                </div>
                {(() => {
                  const grupos = TIPO_GRUPOS.map(g => ({ ...g, animales: animalesFiltrados.filter(a => a.tipo === g.key) })).filter(g => g.animales.length > 0);

                  return grupos.map(grupo => (
                    <RodeoGrupo key={grupo.key} grupo={grupo} lotes={lotes}

                      modoSel={modoSel} seleccionados={selBatch} onToggle={toggleSelAnimal}
                    />

                })()}

                  <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 120, background: COLORS.fieldGreen, color: "#fff", padding: "12px 20px", boxShadow: "0 -4px 20px rgba(0,0,0,0.2)" }}>
                    {!mostrarFormBatch ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 12, maxWidth: 900, margin: "0 auto" }}>
                        <span style={{ fontWeight: 700, fontSize: 15, flex: 1 }}>{selBatch.size} animales seleccionados</span>
                        <button onClick={() => setMostrarFormBatch(true)} style={{ background: "#fff", color: COLORS.fieldGreen, border: "none", borderRadius: 6, padding: "8px 16px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                          Cambiar categoría →
                        </button>
                        <button onClick={salirModoSel} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.7)", cursor: "pointer", fontSize: 18, padding: "0 4px" }}>✕</button>
                      </div>
                    ) : (
                      <div style={{ maxWidth: 900, margin: "0 auto" }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.7)", marginBottom: 10 }}>CAMBIAR {selBatch.size} ANIMALES A:</div>
                        <div style={{ display: "flex", gap: 10, alignItems: "flex-end", flexWrap: "wrap" }}>
                          <div style={{ flex: 1, minWidth: 130 }}>
                            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.8)", marginBottom: 4 }}>ACTIVIDAD</div>
                            <select value={batchActividad} onChange={e => {
                              setBatchActividad(e.target.value);
                              setBatchTipo(TIPO_POR_ACTIVIDAD[e.target.value]?.[0]?.value || batchTipo);
                            }} style={{ width: "100%", padding: "6px 8px", borderRadius: 6, border: "none", fontSize: 13, fontWeight: 600, color: COLORS.textPrimary, background: "#fff" }}>
                              <option value="cria">Cría</option>
                              <option value="recria">Recría</option>
                              <option value="engorde">Engorde</option>
                            </select>
                          </div>
                          <div style={{ flex: 1, minWidth: 130 }}>
                            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.8)", marginBottom: 4 }}>CATEGORÍA</div>
                            <select value={batchTipo} onChange={e => setBatchTipo(e.target.value)} style={{ width: "100%", padding: "6px 8px", borderRadius: 6, border: "none", fontSize: 13, fontWeight: 600, color: COLORS.textPrimary, background: "#fff" }}>

                            const ids = [...selBatch];

                            const etiqueta = tipoLabel(batchTipo) + " / " + catLabel(batchActividad);
                            logEvento("Cambio de categoría: " + ids.length + " animales → " + etiqueta);

                            salirModoSel();
                          }}>
                            Aplicar
                          </Btn>
                          <button onClick={() => setMostrarFormBatch(false)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.7)", cursor: "pointer", fontSize: 13, padding: "0 4px" }}>← Volver</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
                {/* Espacio para que el contenido no quede tapado por la barra */}
                {modoSel && selBatch.size > 0 && <div style={{ height: 80 }} />}

              const registros = (veterinaria || []).filter(v => anioIntervenciones === "todos" || v.fecha?.startsWith(anioIntervenciones));

              // Agrupar por mes → animales
              const mesesMap = {};
              registros.forEach(v => {
                const mes = v.fecha?.slice(0,7);
                if (!mes) return;
                if (!mesesMap[mes]) mesesMap[mes] = {};
                (v.animalesIds || []).forEach(id => {
                  if (!mesesMap[mes][id]) mesesMap[mes][id] = [];
                  mesesMap[mes][id].push(v);
                });
              });
              const meses = Object.keys(mesesMap).sort((a,b) => b.localeCompare(a));

              // Para la ficha: todos los registros por animal (sin filtro de mes)
              const porAnimalTotal = {};
              (veterinaria || []).forEach(v => {
                (v.animalesIds || []).forEach(id => {
                  if (!porAnimalTotal[id]) porAnimalTotal[id] = [];
                  porAnimalTotal[id].push(v);
                });
              });

              const totalAnimales = new Set(registros.flatMap(v => v.animalesIds || [])).size;

              return (
                <div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>

                  </div>

                    const idsDelMes = Object.keys(mesesMap[mes]);
                    const animalesMes = animales.filter(a => idsDelMes.includes(a.id)).sort((a,b) => a.caravana.localeCompare(b.caravana, "es", { numeric: true }));
                    return <MesGrupoAnimales key={mes} mesKey={mes} animales={animalesMes} registrosPorAnimal={mesesMap[mes]} lotes={lotes} esVet={true} onVerAnimal={a => { setAnimalSel(a); setModal("animal"); }} />;
                  })}
                  {meses.length > 0 && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 8, textAlign: "right" }}>{totalAnimales} animales intervenidos</div>}
                </div>
              );
            })()}

              // Agrupar por mes → animales
              const mesesMap = {};
              registros.forEach(v => {
                const mes = v.fecha?.slice(0,7);
                if (!mes) return;
                if (!mesesMap[mes]) mesesMap[mes] = {};
                (v.animalesIds || []).forEach(id => {
                  if (!mesesMap[mes][id]) mesesMap[mes][id] = [];
                  mesesMap[mes][id].push(v);
                });

                        {a === "todos" ? "Todos" : a}
                      </div>
                    ))}
                  </div>
                  {meses.length === 0 && <div style={{ color: COLORS.textMuted, padding: 24, textAlign: "center" }}>Sin vacunaciones registradas{anioVacunados !== "todos" ? " para " + anioVacunados : ""}.</div>}
                  {meses.map(mes => {
                    const idsDelMes = Object.keys(mesesMap[mes]);
                    const animalesMes = animales.filter(a => idsDelMes.includes(a.id)).sort((a,b) => a.caravana.localeCompare(b.caravana, "es", { numeric: true }));

            <div style={{ marginBottom: 14 }}><Btn onClick={() => setModal("nuevoLote")}>+ Lote</Btn></div>

              {lotes.map(l => {
                const aniLote = animales.filter(a => a.lote === l.id);
                return (
                  <Card key={l.id} onClick={() => setLoteViendo(l)} style={{ cursor: "pointer" }}>
                    <div style={{ fontFamily: "Georgia, serif", fontSize: 16, fontWeight: 700, marginBottom: 8 }}>{l.nombre}</div>
                    <div style={{ fontSize: 24, fontWeight: 700, color: COLORS.fieldGreen, marginBottom: 6 }}>{aniLote.length} <span style={{ fontSize: 14, fontWeight: 400, color: COLORS.textMuted }}>animales</span></div>
                    {TIPO_GRUPOS.map(g => { const n = aniLote.filter(a => a.tipo === g.key && a.viva !== false).length; if (!n) return null; return <div key={g.key} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 2 }}><span style={{ color: COLORS.textMuted }}>{g.icon} {g.label}</span><span style={{ fontWeight: 600, color: g.color }}>{n}</span></div>; })}
                    {aniLote.length === 0 && <span style={{ color: COLORS.textMuted, fontSize: 13 }}>Sin animales</span>}
                  </Card>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {modal === "animal" && animalSel && <AnimalDetalle animal={animalSel} lotes={lotes}
        vacunaciones={vacunaciones} veterinaria={veterinaria}
        onClose={() => { setModal(null); setAnimalSel(null); }}
        onActualizarAnimal={(actualizado) => {
          setAnimales(prev => prev.map(a => a.id === actualizado.id ? actualizado : a));
          setAnimalSel(actualizado);
          logEvento("Cambio categoría: " + actualizado.caravana + " → " + tipoLabel(actualizado.tipo) + " / " + catLabel(actualizado.categoria));
          showToast("✓ Categoría actualizada");
        }}
        onBaja={(id, motivo, fecha, obs) => {
          setAnimales(prev => prev.map(a => a.id === id ? { ...a, viva: false, motivoBaja: motivo, fechaBaja: fecha, obsBaja: obs } : a));
          const a = animales.find(x => x.id === id);
          if (a) logEvento("Baja: " + a.caravana + " (" + tipoLabel(a.tipo) + ") por " + motivo, fecha);
          setModal(null); setAnimalSel(null);
          showToast("✓ Baja registrada — " + motivo);
        }}
      />}
      {modal === "nuevoAnimal" && <NuevoAnimal lotes={lotes} onSave={(a) => { setAnimales(p => [...p, a]); setModal(null); showToast("✓ Animal agregado"); }} onClose={() => setModal(null)} />}
      {modal === "importar" && <ImportarExcel lotes={lotes} onImport={(nuevos) => { setAnimales(nuevos); showToast(`✓ ${nuevos.length} animales importados`); setModal(null); }} onClose={() => setModal(null)} />}
      {modal === "juntada" && <VistaJuntada animales={animales} juntadas={juntadas} onSave={(j) => { setJuntadas(p => [...p, j]); showToast("✓ Juntada guardada"); }} onClose={() => setModal(null)} />}
      {modal === "recorrida" && <VistaRecorridas recorridas={recorridas}
        onSave={(r) => { setRecorridas(p => [r, ...p]); showToast("✓ Novedad registrada"); }}
        onActualizar={(r) => { setRecorridas(p => p.map(x => x.id === r.id ? r : x)); showToast("✓ Novedad editada"); }}
        onEliminar={(id) => { setRecorridas(p => p.filter(x => x.id !== id)); showToast("✓ Novedad eliminada"); }}
        onClose={() => setModal(null)} />}
      {modal === "nuevoLote" && <NuevoLote onSave={(l) => { setLotes(p => [...p, l]); setModal(null); showToast("✓ Lote agregado"); }} onClose={() => setModal(null)} />}
      {modal === "movimiento" && <ModalMovimiento animales={animales} lotes={lotes} onSave={aplicarMovimiento} onClose={() => setModal(null)} />}
      {modal === "cambioActividad" && <ModalCambioActividad animales={animales} lotes={lotes} onSave={aplicarCambioActividad} onClose={() => setModal(null)} />}
    </div>
  );
};

// ── APP PRINCIPAL ────────────────────────────────────────────────
function CampoAdmin() {
  const cache = loadStateLocal();
  const [animales, setAnimales] = useState(cache?.animales || ANIMALES_DEFAULT);
  const [lotes, setLotes] = useState(cache?.lotes || LOTES_DEFAULT);
  const [juntadas, setJuntadas] = useState(cache?.juntadas || []);
  const [recorridas, setRecorridas] = useState(cache?.recorridas || []);
  const [cultivos, setCultivos] = useState(() => {
    const sc = cache?.cultivos;
    const hasDatos = sc && ["mariaisabel","corraldepachi"].some(e =>
      ["norte","sur"].some(p => (sc[e]?.[p]?.length || 0) > 0)
    );
    if (!hasDatos) return CULTIVOS_DEFAULT;
    return {
      mariaisabel: {
        norte: sc.mariaisabel?.norte?.length > 0 ? sc.mariaisabel.norte : CULTIVOS_DEFAULT.mariaisabel.norte,
        sur:   sc.mariaisabel?.sur?.length   > 0 ? sc.mariaisabel.sur   : CULTIVOS_DEFAULT.mariaisabel.sur,
      },
      corraldepachi: {
        norte: sc.corraldepachi?.norte?.length > 0 ? sc.corraldepachi.norte : CULTIVOS_DEFAULT.corraldepachi.norte,
        sur:   sc.corraldepachi?.sur?.length   > 0 ? sc.corraldepachi.sur   : CULTIVOS_DEFAULT.corraldepachi.sur,
      },
    };
  });
  const [lluvias, setLluvias] = useState(cache?.lluvias || LLUVIAS_DEFAULT);
  const [movimientos, setMovimientos] = useState(cache?.movimientos || []);
  const [vacunaciones, setVacunaciones] = useState(cache?.vacunaciones || []);
  const [veterinaria, setVeterinaria] = useState(cache?.veterinaria || []);
  const [estructurales, setEstructurales] = useState(cache?.estructurales || []);
  const [eventosRodeo, setEventosRodeo] = useState(cache?.eventosRodeo || []);
  const [novedadesAgri, setNovedadesAgri] = useState(cache?.novedadesAgri || {});
  const [hectareasAgri, setHectareasAgri] = useState(cache?.hectareasAgri || HECTAREAS_AGRI_DEFAULT);
  const [pantalla, setPantalla] = useState("inicio");
  const [targetLote, setTargetLote] = useState(null);
  const [ultimoReporteGallinas, setUltimoReporteGallinas] = useState(null);

  // Cargar último reporte de gallinas para mostrar en la tarjeta principal
  useEffect(() => {
    if (!fbLoaded) return;
    const db = window.__firebaseDb;
    if (!db) return;
    db.collection("gallinas_reportes").orderBy("fecha","desc").limit(1).get()
      .then(snap => { if (!snap.empty) setUltimoReporteGallinas(snap.docs[0].data()); })
      .catch(() => {});
  }, [fbLoaded]);
  const [toast, setToast] = useState(null);
  const [syncStatus, setSyncStatus] = useState("local"); // "local" | "syncing" | "ok" | "error"
  const [fbLoaded, setFbLoaded] = useState(false);

  // Cargar desde Firebase al iniciar
  useEffect(() => {
    loadStateFirebase().then(({ data: fbData, connected, error }) => {
      if (fbData) {
        if (fbData.animales?.length)  setAnimales(fbData.animales);
        if (fbData.lotes?.length)     setLotes(fbData.lotes);
        if (fbData.juntadas)          setJuntadas(fbData.juntadas);
        if (fbData.recorridas)        setRecorridas(fbData.recorridas);
        if (fbData.cultivos)          setCultivos(fbData.cultivos);
        if (fbData.lluvias)           setLluvias(fbData.lluvias);
        if (fbData.movimientos)       setMovimientos(fbData.movimientos);
        if (fbData.vacunaciones)      setVacunaciones(fbData.vacunaciones);
        if (fbData.veterinaria)       setVeterinaria(fbData.veterinaria);
        if (fbData.estructurales)     setEstructurales(fbData.estructurales);
        if (fbData.eventosRodeo)      setEventosRodeo(fbData.eventosRodeo);
        if (fbData.novedadesAgri)     setNovedadesAgri(fbData.novedadesAgri);
        if (fbData.hectareasAgri)     setHectareasAgri(fbData.hectareasAgri);
      }
      if (!connected) console.warn("Firebase error:", error);
      setSyncStatus(connected ? "ok" : "local");
      setFbLoaded(true);
    });
  }, []);

  // Guardar cuando cambia algo
  useEffect(() => {
    if (!fbLoaded) return;
    const data = { animales, lotes, juntadas, recorridas, cultivos, lluvias, movimientos, vacunaciones, veterinaria, estructurales, eventosRodeo, novedadesAgri, hectareasAgri };
    saveStateLocal(data);
    setSyncStatus("syncing");
    saveStateFirebase(data, (status) => setSyncStatus(status === "ok" ? "ok" : status === "local" ? "local" : "error"));
  }, [animales, lotes, juntadas, recorridas, cultivos, lluvias, movimientos, vacunaciones, veterinaria, estructurales, eventosRodeo, novedadesAgri, hectareasAgri]);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
  const resetearDatos = async () => {
    saveStateLocal(null);
    localStorage.removeItem(STORAGE_KEY);
    const doc = DB_DOC();
    if (doc) try { await doc.delete(); } catch {}
    setAnimales(ANIMALES_DEFAULT); setLotes(LOTES_DEFAULT); setJuntadas([]); setRecorridas([]);
    setCultivos(CULTIVOS_DEFAULT); setLluvias(LLUVIAS_DEFAULT); setMovimientos([]);
    setVacunaciones([]); setVeterinaria([]); setEstructurales([]); setEventosRodeo([]);
    setNovedadesAgri({}); setHectareasAgri(HECTAREAS_AGRI_DEFAULT);
    setVacunaciones([]); setVeterinaria([]); setEstructurales([]);
    setEventosRodeo([]); setPantalla("inicio");
  };

  return (
    <div>
      {toast && <div style={{ position: "fixed", top: 20, right: 20, zIndex: 200, background: COLORS.success, color: "#fff", padding: "12px 20px", borderRadius: 8, fontSize: 14, fontWeight: 600, boxShadow: "0 4px 20px rgba(0,0,0,0.2)" }}>{toast}</div>}
      {/* Indicador de sincronización — esquina superior derecha */}
      <div onClick={() => { if (syncStatus === "local" || syncStatus === "error") alert("Estado Firebase: " + syncStatus + "\n__firebaseDb: " + (window.__firebaseDb ? "OK" : "null")); }} style={{ position: "fixed", top: 10, right: 10, zIndex: 150, fontSize: 11, fontWeight: 600, padding: "3px 9px", borderRadius: 10, background: syncStatus === "ok" ? COLORS.success : syncStatus === "syncing" ? COLORS.straw : syncStatus === "error" ? COLORS.danger : "#999", color: "#fff", opacity: 0.85, cursor: "pointer" }}>
        {syncStatus === "ok" ? "☁ Sincronizado" : syncStatus === "syncing" ? "⟳ Guardando…" : syncStatus === "error" ? "⚠ Sin sync" : "💾 Local"}
      </div>
      {/* Botón reset discreto — esquina inferior derecha */}
      <div style={{ position: "fixed", bottom: 14, right: 14, zIndex: 100 }}>
        <button onClick={resetearDatos} title="Borrar datos y recargar" style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 16, padding: "4px 10px", fontSize: 10, color: "#999", cursor: "pointer" }}>↺ resetear</button>
      </div>
      {pantalla === "inicio" && <PantallaInicio animales={animales} lotes={lotes} recorridas={recorridas} cultivos={cultivos} lluvias={lluvias} ultimoReporteGallinas={ultimoReporteGallinas} onEntrar={(id, lote) => { setPantalla(id); if (lote) setTargetLote(lote); }} />}
      {pantalla === "gallinas" && <VistaGallinas onVolver={() => setPantalla("inicio")} />}
      {pantalla === "manzanito" && <VistaManzanito animales={animales} setAnimales={setAnimales} lotes={lotes} setLotes={setLotes} juntadas={juntadas} setJuntadas={setJuntadas} recorridas={recorridas} setRecorridas={setRecorridas} movimientos={movimientos} setMovimientos={setMovimientos} vacunaciones={vacunaciones} setVacunaciones={setVacunaciones} veterinaria={veterinaria} setVeterinaria={setVeterinaria} estructurales={estructurales} setEstructurales={setEstructurales} eventosRodeo={eventosRodeo} setEventosRodeo={setEventosRodeo} onVolver={() => setPantalla("inicio")} showToast={showToast} />}
      {(pantalla === "mariaisabel" || pantalla === "corraldepachi") && <VistaAgricola estabId={pantalla} estabNombre={pantalla === "mariaisabel" ? "María Isabel" : "Corral de Pachi"} estab={ESTABLECIMIENTOS.find(e => e.id === pantalla)} cultivos={cultivos} setCultivos={setCultivos} lluvias={lluvias} setLluvias={setLluvias} novedadesAgri={novedadesAgri} setNovedadesAgri={setNovedadesAgri} hectareasAgri={hectareasAgri} setHectareasAgri={setHectareasAgri} initialVista={targetLote} onVolver={() => { setPantalla("inicio"); setTargetLote(null); }} showToast={showToast} />}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<CampoAdmin/>);
  </script>
</body>
</html>
