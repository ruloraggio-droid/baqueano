const STORAGE_KEY = "campo_v4";
const migrateState = (state) => {
  if (!state) return null;
  const mig = { "Lote 1 - Norte": "El Amarillo", "Lote 2 - Sur": "El Manzanito", "Lote 3 - Cañada": "Vaquillonas" };
  if (state.lotes) {
    state.lotes = state.lotes.map(l => ({ ...l, nombre: mig[l.nombre] || l.nombre }));
    if (!state.lotes.find(l => l.id === "L4")) state.lotes.push({ id: "L4", nombre: "Lago" });
  }
  return state;
};
const loadStateLocal = () => { try { const r = localStorage.getItem(STORAGE_KEY); return r ? migrateState(JSON.parse(r)) : null; } catch { return null; } };
const saveStateLocal = (s) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} };

const DB_DOC = () => window.__firebaseDb ? window.__firebaseDb.collection("datos").doc("principal") : null;
const loadStateFirebase = async () => {
  const doc = DB_DOC();
  if (!doc) return { data: null, connected: false, error: "Firebase no inicializado" };
  try {
    const snap = await doc.get();
    return { data: snap.exists ? migrateState(snap.data()) : null, connected: true, error: null };
  } catch(e) { return { data: null, connected: false, error: e.message }; }
};
const saveStateFirebase = (() => {
  let timer = null;
  return (data, onDone) => {
    clearTimeout(timer);
    timer = setTimeout(async () => {
      const doc = DB_DOC();
      if (!doc) { onDone?.("local"); return; }
      try { await doc.set(data); onDone?.("ok"); } catch { onDone?.("error"); }
    }, 1500);
  };
})();

const fmtFecha = (s) => { if (!s) return "—"; const [y, m, d] = s.split("-"); return `${d}/${m}/${y.slice(2)}`; };
const toISODate = (val) => {
  if (!val) return "";
  if (typeof val === "number") { const d = new Date(Math.round((val - 25569) * 86400 * 1000)); return d.toISOString().split("T")[0]; }
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [d, m, y] = s.split("/"); return `${y}-${m}-${d}`; }
  return s;
};

const DateInput = ({ label, value, onChange, style = {} }) => {
  const isoToDisplay = (iso) => {
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return `${d}/${m}/${y.slice(2)}`;
  };
  const displayToISO = (disp) => {
    const clean = disp.replace(/\D/g, "").slice(0, 6);
    if (clean.length < 6) return null;
    const d = clean.slice(0, 2), m = clean.slice(2, 4), y = clean.slice(4, 6);
    if (Number(d) < 1 || Number(d) > 31 || Number(m) < 1 || Number(m) > 12) return null;
    return `20${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  };
  const [text, setText] = useState(isoToDisplay(value));
  // Sync when value prop changes from outside
  useEffect(() => { setText(isoToDisplay(value)); }, [value]);
  const handleChange = (v) => {
    const clean = v.replace(/\D/g, "").slice(0, 6);
    let fmt = clean;
    if (clean.length > 2) fmt = clean.slice(0, 2) + "/" + clean.slice(2);
    if (clean.length > 4) fmt = fmt.slice(0, 5) + "/" + clean.slice(4);
    setText(fmt);
    const iso = displayToISO(fmt);
    if (iso) onChange(iso);
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, ...style }}>
      {label && <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: "0.05em" }}>{label.toUpperCase()}</label>}
      <input
        type="text"
        value={text}
        onChange={e => handleChange(e.target.value)}
        placeholder="dd/mm/aa"
        maxLength={8}
        style={{ border: `1px solid ${COLORS.border}`, borderRadius: 5, padding: "8px 10px", fontSize: 14, fontFamily: "system-ui, sans-serif", background: COLORS.bg, color: COLORS.textPrimary, outline: "none" }}
      />
    </div>
  );
};

        <h2 style={{ margin: 0, fontSize: 18, fontFamily: "Georgia, serif", color: COLORS.fieldGreen, fontWeight: 700 }}>{title}</h2>
        <button onClick={onClose} style={{ background: "rgba(0,0,0,0.06)", border: "none", borderRadius: 8, width: 32, height: 32, fontSize: 18, cursor: "pointer", color: COLORS.textMuted, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>×</button>
      </div>
      {children}
    </div>
  </div>
);

// ── Croquis ──────────────────────────────────────────────────────
const CroquisCampo = ({ estab, onLoteClick = null, cultivosNorte = [] }) => {
  const w = 260, baseH = 160;
  const h = estab.alargado ? Math.round(baseH * 1.45) : baseH;
  const lotes = estab.lotesCroquis;
  const tieneOeste = lotes.some(l => l.pos === "oeste");
  const tieneFondo = lotes.some(l => l.pos === "fondo");
  const [hovered, setHovered] = useState(null);
  const pal = { norte: "#C8DDB8", sur: "#B5D4A0", oeste: "#A8C895", fondo: "#B8D4B0", borde: "#6A9B4E", texto: "#2D4A1E", hover: "#B0CC98", norteA: "#F5E6C8", surA: "#EDD9A8", bordeA: "#C8A45A", textoA: "#7A5C3A", hoverA: "#E8D4A0", sub2A: "#EED5B5" };
  const isGan = estab.tipo === "ganadero";
  const fondoH = tieneFondo ? Math.round(h * 0.27) : 0;
  const mainH = h - fondoH;
  const oesteW = tieneOeste ? w * 0.32 : 0;
  const mainX = tieneOeste ? oesteW : 0;
  const mainW = tieneOeste ? w - oesteW : w;
  const loteOeste = lotes.find(l => l.pos === "oeste");
  const loteNorte = lotes.find(l => l.pos === "norte");
  const loteSur = lotes.find(l => l.pos === "sur");
  const loteFondo = lotes.find(l => l.pos === "fondo");
  const clickable = !!onLoteClick;
  const norteColor = isGan ? pal.norte : pal.norteA;
  const surColor = isGan ? pal.sur : pal.surA;
  const bordeColor = isGan ? pal.borde : pal.bordeA;
  const textoColor = isGan ? pal.texto : pal.textoA;
  const hoverColor = isGan ? pal.hover : pal.hoverA;

  // División dinámica: mostrar si hay cultivos con sublote "1.2" activos o recientes
  const tieneSubdivision = loteNorte?.subdividido &&
    cultivosNorte.some(c => c.sublote === "B");

  return (
    <svg width={w} height={h} style={{ borderRadius: 8, overflow: "hidden", display: "block" }}>
      <rect width={w} height={h} fill="#EEE8DC" rx={8} />
      <text x={w - 10} y={14} textAnchor="middle" fontSize={9} fill={COLORS.textMuted} fontWeight="700">N</text>
      <text x={w - 10} y={h - 4} textAnchor="middle" fontSize={9} fill={COLORS.textMuted} fontWeight="700">S</text>

      {/* Vaquillonas — franja izquierda vertical */}
      {tieneOeste && loteOeste && (
        <g onClick={() => onLoteClick?.(loteOeste)} onMouseEnter={() => setHovered("oeste")} onMouseLeave={() => setHovered(null)} style={{ cursor: clickable ? "pointer" : "default" }}>
          <rect x={4} y={4} width={oesteW - 4} height={mainH - 8} fill={hovered === "oeste" && clickable ? hoverColor : pal.oeste} rx={3} stroke={bordeColor} strokeWidth={1.2} />
          <text x={oesteW / 2} y={16} textAnchor="middle" fontSize={10} fill={textoColor} fontWeight="700">{loteOeste.nombre.split(" ")[0]}</text>
          {loteOeste.nombre.split(" ").length > 1 && <text x={oesteW / 2} y={28} textAnchor="middle" fontSize={10} fill={textoColor} fontWeight="700">{loteOeste.nombre.split(" ").slice(1).join(" ")}</text>}
        </g>
      )}

      {/* Lote Norte — con subdivisión dinámica */}
      {loteNorte && (() => {
        const nx = mainX + 2, ny = 4, nw = mainW - 8, nh = mainH / 2 - 6;
        const sub = tieneSubdivision;
        const s2w = Math.round(nw * 0.38), s2h = Math.round(nh * 0.42);
        const s2x = nx + nw - s2w, s2y = ny + nh - s2h;
        return (
          <g>
            <g onClick={() => onLoteClick?.(loteNorte)} onMouseEnter={() => setHovered("norte")} onMouseLeave={() => setHovered(null)} style={{ cursor: clickable ? "pointer" : "default" }}>
              {sub ? (
                <polygon
                  points={nx + "," + ny + " " + (nx+nw) + "," + ny + " " + (nx+nw) + "," + s2y + " " + s2x + "," + s2y + " " + s2x + "," + (ny+nh) + " " + nx + "," + (ny+nh)}
                  fill={hovered === "norte" && clickable ? hoverColor : norteColor}
                  stroke={bordeColor} strokeWidth={1.2}
                />
              ) : (
                <rect x={nx} y={ny} width={nw} height={nh} fill={hovered === "norte" && clickable ? hoverColor : norteColor} rx={3} stroke={bordeColor} strokeWidth={1.2} />
              )}
              <text x={mainX + mainW / 2 - (sub ? s2w/2 : 2)} y={ny + nh / 2 - (sub ? 4 : 0)} textAnchor="middle" fontSize={11} fill={textoColor} fontWeight="600">{sub ? "Norte A" : loteNorte.nombre}</text>
              {sub && <text x={mainX + mainW / 2 - s2w/2} y={ny + nh / 2 + 10} textAnchor="middle" fontSize={8} fill={textoColor} opacity={0.65}>35 ha</text>}
              {clickable && !sub && <text x={mainX + mainW / 2 - 2} y={ny + nh / 2 + 14} textAnchor="middle" fontSize={9} fill={textoColor} opacity={0.55}>Ver detalle →</text>}
            </g>
            {sub && (
              <g onClick={() => onLoteClick?.(loteNorte)} onMouseEnter={() => setHovered("norte12")} onMouseLeave={() => setHovered(null)} style={{ cursor: clickable ? "pointer" : "default" }}>
                <rect x={s2x} y={s2y} width={s2w} height={s2h} fill={hovered === "norte12" && clickable ? hoverColor : pal.sub2A} rx={2} stroke={bordeColor} strokeWidth={1.2} />
                <text x={s2x + s2w/2} y={s2y + s2h/2 - 4} textAnchor="middle" fontSize={8} fill={textoColor} fontWeight="700">Norte B</text>
                <text x={s2x + s2w/2} y={s2y + s2h/2 + 6} textAnchor="middle" fontSize={7} fill={textoColor} opacity={0.7}>20 ha</text>
              </g>
            )}
          </g>
        );
      })()}

      {/* El Manzanito — sur */}
      {loteSur && (
        <g onClick={() => onLoteClick?.(loteSur)} onMouseEnter={() => setHovered("sur")} onMouseLeave={() => setHovered(null)} style={{ cursor: clickable ? "pointer" : "default" }}>
          <rect x={mainX + 2} y={mainH / 2 + 2} width={mainW - 8} height={mainH / 2 - 6} fill={hovered === "sur" && clickable ? hoverColor : surColor} rx={3} stroke={bordeColor} strokeWidth={1.2} />
          <text x={mainX + mainW / 2 - 2} y={mainH * 3 / 4} textAnchor="middle" fontSize={11} fill={textoColor} fontWeight="600">{loteSur.nombre}</text>
          {clickable && <text x={mainX + mainW / 2 - 2} y={mainH * 3 / 4 + 14} textAnchor="middle" fontSize={9} fill={textoColor} opacity={0.55}>Ver detalle →</text>}
        </g>
      )}

      {/* Lago — franja inferior completa */}
      {tieneFondo && loteFondo && (
        <g onClick={() => onLoteClick?.(loteFondo)} onMouseEnter={() => setHovered("fondo")} onMouseLeave={() => setHovered(null)} style={{ cursor: clickable ? "pointer" : "default" }}>
          <rect x={4} y={mainH + 2} width={w - 8} height={fondoH - 6} fill={hovered === "fondo" && clickable ? hoverColor : pal.fondo} rx={3} stroke={bordeColor} strokeWidth={1.2} />
          <text x={w / 2} y={mainH + fondoH / 2 + 4} textAnchor="middle" fontSize={10} fill={textoColor} fontWeight="700">{loteFondo.nombre}</text>
        </g>
      )}

      {/* Líneas */}
      <line x1={mainX + 4} y1={mainH / 2} x2={w - 6} y2={mainH / 2} stroke={bordeColor} strokeWidth={1.5} strokeDasharray="4,3" />
      {tieneOeste && <line x1={oesteW} y1={6} x2={oesteW} y2={mainH - 4} stroke={bordeColor} strokeWidth={1.5} strokeDasharray="4,3" />}
      {tieneFondo && <line x1={6} y1={mainH} x2={w - 6} y2={mainH} stroke={bordeColor} strokeWidth={1.5} strokeDasharray="4,3" />}
    </svg>
  );
};

// ── Croquis dinámico Manzanito ───────────────────────────────────
const CroquisDinamico = ({ animales, lotes, movimientos, onLoteClick }) => {
  const estab = ESTABLECIMIENTOS[0];
  const w = 300, h = 230;
  const [hov, setHov] = useState(null);
  const hoy = new Date();
  const fondoH = Math.round(h * 0.3);
  const mainH = h - fondoH;
  const oesteW = w * 0.32;
  const mainX = oesteW;
  const mainW = w - oesteW;
  const pal = { norte: "#C8DDB8", sur: "#B5D4A0", oeste: "#A8C895", fondo: "#B8D4B0", borde: "#6A9B4E", texto: "#2D4A1E", descanso: "#FFF3CD", descansoB: "#F0C050" };

  const estadoLote = (loteId) => {
    const en = animales.filter(a => a.lote === loteId);
    if (en.length > 0) {
      const tipos = { T: 0, V: 0, Vr: 0, Tr: 0, t: 0 };
      en.forEach(a => {
        if (a.tipo === "toro") tipos.T++;
        else if (a.tipo === "vaca") tipos.V++;
        else if (a.tipo === "vaquillona") tipos.Vr++;
        else if (a.tipo === "torito") tipos.Tr++;
        else if (a.tipo === "ternero" || a.tipo === "ternera") tipos.t++;
        else tipos.V++;
      });
      return { tipo: "ocupado", total: en.length, tipos };
    }
    const salidas = movimientos.filter(m => m.loteOrigen === loteId).sort((a, b) => b.fecha.localeCompare(a.fecha));
    if (salidas.length > 0) {
      const dias = Math.floor((hoy - new Date(salidas[0].fecha)) / (1000 * 60 * 60 * 24));
      return { tipo: "descanso", dias, meses: Math.floor(dias / 30) };
    }
    return { tipo: "vacio" };
  };

  const renderLote = (loteId, x, y, w2, h2, pos) => {
    const loteConf = estab.lotesCroquis.find(l => l.pos === pos);
    const nombre = loteConf?.nombre || pos;
    const estado = estadoLote(loteId);
    const bgBase = pos === "oeste" ? pal.oeste : pos === "norte" ? pal.norte : pos === "fondo" ? pal.fondo : pal.sur;
    const bg = estado.tipo === "descanso" ? pal.descanso : estado.tipo === "ocupado" ? bgBase : "#EEE8DC";
    const borde = estado.tipo === "descanso" ? pal.descansoB : pal.borde;
    const isHov = hov === loteId;
    const isOeste = pos === "oeste";
    const cx = x + w2 / 2;
    const palabras = nombre.split(" ");
    const tiposStr = estado.tipo === "ocupado"
      ? Object.entries(estado.tipos).filter(([,v]) => v > 0).map(([k,v]) => `${k}:${v}`).join("  ")
      : "";
    return (
      <g key={loteId} onClick={() => onLoteClick?.(loteId)} onMouseEnter={() => setHov(loteId)} onMouseLeave={() => setHov(null)} style={{ cursor: onLoteClick ? "pointer" : "default" }}>
        <rect x={x} y={y} width={w2} height={h2} fill={isHov && onLoteClick ? "#D4EAC0" : bg} rx={3} stroke={borde} strokeWidth={isHov ? 2 : 1.2} />
        {isOeste ? (
          <>
            <text x={cx} y={y + 14} textAnchor="middle" fontSize={10} fill={pal.texto} fontWeight="700">{palabras[0]}</text>
            {palabras.length > 1 && <text x={cx} y={y + 26} textAnchor="middle" fontSize={10} fill={pal.texto} fontWeight="700">{palabras.slice(1).join(" ")}</text>}
          </>
        ) : (
          <text x={cx} y={y + 14} textAnchor="middle" fontSize={10} fill={pal.texto} fontWeight="700">{nombre}</text>
        )}
        {estado.tipo === "ocupado" && (
          <>
            <text x={cx} y={y + h2 / 2 + 4} textAnchor="middle" fontSize={isOeste ? 13 : 15} fill={pal.texto} fontWeight="700">{estado.total}</text>
            <text x={cx} y={y + h2 / 2 + 16} textAnchor="middle" fontSize={8} fill={pal.texto} opacity={0.7}>animales</text>
            {tiposStr ? <text x={cx} y={y + h2 - 8} textAnchor="middle" fontSize={8} fill={pal.texto} opacity={0.8}>{tiposStr}</text> : null}
          </>
        )}
        {estado.tipo === "descanso" && (
          <>
            <text x={cx} y={y + h2 / 2 + 4} textAnchor="middle" fontSize={13} fill="#856404" fontWeight="700">{estado.meses > 0 ? `${estado.meses}m` : `${estado.dias}d`}</text>
            <text x={cx} y={y + h2 / 2 + 17} textAnchor="middle" fontSize={8} fill="#856404" opacity={0.8}>descanso</text>
          </>
        )}
        {estado.tipo === "vacio" && <text x={cx} y={y + h2 / 2 + 4} textAnchor="middle" fontSize={9} fill={pal.texto} opacity={0.4}>vacío</text>}
      </g>
    );
  };

  const loteConfs = estab.lotesCroquis;
  const loteOeste = loteConfs.find(l => l.pos === "oeste");
  const loteNorte = loteConfs.find(l => l.pos === "norte");
  const loteSur = loteConfs.find(l => l.pos === "sur");
  const loteFondo = loteConfs.find(l => l.pos === "fondo");

  return (
    <div>
      <svg width={w} height={h} style={{ borderRadius: 8, overflow: "hidden", display: "block" }}>
        <rect width={w} height={h} fill="#EEE8DC" rx={8} />
        <text x={w - 10} y={14} textAnchor="middle" fontSize={9} fill={COLORS.textMuted} fontWeight="700">N</text>
        <text x={w - 10} y={h - 4} textAnchor="middle" fontSize={9} fill={COLORS.textMuted} fontWeight="700">S</text>
        {loteOeste && renderLote(loteOeste.id, 4, 4, oesteW - 4, mainH - 8, "oeste")}
        {loteNorte && renderLote(loteNorte.id, mainX + 2, 4, mainW - 8, mainH / 2 - 6, "norte")}
        {loteSur && renderLote(loteSur.id, mainX + 2, mainH / 2 + 2, mainW - 8, mainH / 2 - 6, "sur")}
        {loteFondo && renderLote(loteFondo.id, 4, mainH + 2, w - 8, fondoH - 6, "fondo")}
        <line x1={oesteW} y1={6} x2={oesteW} y2={mainH - 4} stroke={pal.borde} strokeWidth={1.5} strokeDasharray="4,3" />
        <line x1={mainX + 4} y1={mainH / 2} x2={w - 8} y2={mainH / 2} stroke={pal.borde} strokeWidth={1.5} strokeDasharray="4,3" />
        <line x1={6} y1={mainH} x2={w - 6} y2={mainH} stroke={pal.borde} strokeWidth={1.5} strokeDasharray="4,3" />
      </svg>
      <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 11, color: COLORS.textMuted }}>
        <span><span style={{ width: 10, height: 10, background: "#C8DDB8", border: "1px solid #6A9B4E", borderRadius: 2, display: "inline-block", marginRight: 4 }} />Con animales</span>
        <span><span style={{ width: 10, height: 10, background: "#FFF3CD", border: "1px solid #F0C050", borderRadius: 2, display: "inline-block", marginRight: 4 }} />En descanso</span>
      </div>
    </div>
  );
};


// ── MiniChart ────────────────────────────────────────────────────
const MiniChart = ({ pesadas }) => {
  if (!pesadas || pesadas.length < 2) return <span style={{ color: COLORS.textMuted, fontSize: 13 }}>Sin datos suficientes</span>;
  const vals = pesadas.map(p => p.kg);
  const min = Math.min(...vals) - 20, max = Math.max(...vals) + 20;
  const w = 220, h = 70;
  const points = pesadas.map((p, i) => { const x = (i / (pesadas.length - 1)) * (w - 20) + 10; const y = h - ((p.kg - min) / (max - min)) * (h - 10) - 5; return `${x},${y}`; }).join(" ");
  return (
    <div>
      <svg width={w} height={h} style={{ overflow: "visible" }}>
        <polyline points={points} fill="none" stroke={COLORS.fieldGreen} strokeWidth={2.5} strokeLinejoin="round" />
        {pesadas.map((p, i) => { const x = (i / (pesadas.length - 1)) * (w - 20) + 10; const y = h - ((p.kg - min) / (max - min)) * (h - 10) - 5; return (<g key={i}><circle cx={x} cy={y} r={4} fill={COLORS.straw} stroke={COLORS.fieldGreen} strokeWidth={1.5} /><text x={x} y={y - 8} textAnchor="middle" fontSize={10} fill={COLORS.textMuted}>{p.kg}kg</text></g>); })}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: COLORS.textMuted, paddingTop: 2 }}>{pesadas.map((p, i) => <span key={i}>{fmtFecha(p.fecha)}</span>)}</div>
    </div>
  );
};

// ── Modal: Detalle animal ────────────────────────────────────────
const AnimalDetalle = ({ animal, lotes, onClose, onBaja, onActualizarAnimal, vacunaciones, veterinaria }) => {
  const lote = lotes.find(l => l.id === animal.lote);
  const esCria = animal.categoria === "cria";
  const prenezPos = esCria ? (animal.eventos || []).filter(e => e.tipo === "preñez" && e.resultado === "positiva").length : 0;
  const prenezTotal = esCria ? (animal.eventos || []).filter(e => e.tipo === "preñez").length : 0;
  const pct = prenezTotal > 0 ? Math.round((prenezPos / prenezTotal) * 100) : null;
  const [modalBaja, setModalBaja] = useState(false);
  const [motivoBaja, setMotivoBaja] = useState("muerte");
  const [fechaBaja, setFechaBaja] = useState(new Date().toISOString().split("T")[0]);
  const [obsBaja, setObsBaja] = useState("");
  const [editandoCat, setEditandoCat] = useState(false);
  const [nuevoTipo, setNuevoTipo] = useState(animal.tipo);
  const [nuevaActividad, setNuevaActividad] = useState(animal.categoria);

  const tiposDisp = TIPO_POR_ACTIVIDAD[nuevaActividad] || [];

  const tratamientos = [
    ...(vacunaciones || []).filter(a => a.animalesIds?.includes(animal.id)).map(a => ({ ...a, tipoLabel: "💉 Vacunación" })),
    ...(veterinaria  || []).filter(a => a.animalesIds?.includes(animal.id)).map(a => ({ ...a, tipoLabel: "🩺 Veterinaria" })),
  ].sort((a, b) => b.fecha.localeCompare(a.fecha));

  const MOTIVOS = [
    { value: "muerte", label: "Muerte", icon: "💀" },
    { value: "venta",  label: "Venta",  icon: "💰" },
    { value: "robo",   label: "Robo",   icon: "🚨" },
  ];

  return (
    <Modal title={`${tipoLabel(animal.tipo) || "Animal"} ${animal.caravana}${animal.viva === false ? " · BAJA" : ""}`} onClose={onClose}>
      {animal.viva === false && (
        <div style={{ background: "#FEE2E2", border: "1px solid #FCA5A5", borderRadius: 6, padding: "8px 12px", marginBottom: 14, fontSize: 13, color: COLORS.danger, fontWeight: 600 }}>
          {MOTIVOS.find(m => m.value === animal.motivoBaja)?.icon} Baja por {animal.motivoBaja} · {fmtFecha(animal.fechaBaja)}
          {animal.obsBaja && <div style={{ fontWeight: 400, marginTop: 2 }}>{animal.obsBaja}</div>}
        </div>
      )}

      {/* Info principal */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600 }}>CATEGORÍA</div>
          <div style={{ fontSize: 14, marginTop: 2, fontWeight: 700 }}>{tipoLabel(animal.tipo) || animal.tipo}</div>
        </div>
        <div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600 }}>ACTIVIDAD</div>
          <div style={{ marginTop: 2 }}><Badge cat={animal.categoria} /></div>
        </div>
        <div><div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600 }}>LOTE</div><div style={{ fontSize: 14, marginTop: 2 }}>{lote?.nombre || "—"}</div></div>
        <div><div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600 }}>NACIMIENTO</div><div style={{ fontSize: 14 }}>{fmtFecha(animal.fechaNac)}</div></div>
        <div><div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600 }}>EDAD</div><div style={{ fontSize: 14 }}>{calcEdad(animal.fechaNac)}</div></div>
      </div>

      {/* Cambio de categoría/actividad */}
      {animal.viva !== false && !modalBaja && (
        <div style={{ marginBottom: 16 }}>
          {!editandoCat ? (
            <Btn small variant="ghost" onClick={() => setEditandoCat(true)}>✏ Cambiar categoría / actividad</Btn>
          ) : (
            <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textMuted, marginBottom: 10 }}>CAMBIAR CATEGORÍA / ACTIVIDAD</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                <Select label="Actividad" value={nuevaActividad} onChange={v => {
                  setNuevaActividad(v);
                  setNuevoTipo(TIPO_POR_ACTIVIDAD[v]?.[0]?.value || nuevoTipo);
                }} options={[{ value:"cria", label:"Cría" }, { value:"recria", label:"Recría" }, { value:"engorde", label:"Engorde" }]} />
                <Select label="Categoría" value={nuevoTipo} onChange={setNuevoTipo} options={tiposDisp} />
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn small onClick={() => { onActualizarAnimal({ ...animal, tipo: nuevoTipo, categoria: nuevaActividad }); setEditandoCat(false); }}>Guardar</Btn>
                <Btn small variant="ghost" onClick={() => setEditandoCat(false)}>Cancelar</Btn>
              </div>
            </div>

        </div>
      )}

      {animal.obs && <div style={{ background: "#FFF3CD", border: "1px solid #FFEAA7", borderRadius: 6, padding: "8px 12px", marginBottom: 16, fontSize: 13, color: "#856404" }}>⚠ {animal.obs}</div>}
      {esCria && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.textMuted, marginBottom: 10 }}>HISTORIAL DE PREÑEZ</div>
          {pct !== null && <div style={{ fontSize: 13, marginBottom: 10, color: COLORS.fieldGreen, fontWeight: 600 }}>Tasa histórica: {pct}% ({prenezPos}/{prenezTotal})</div>}
          {(animal.eventos || []).map((ev, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 12px", background: COLORS.bg, borderRadius: 5, fontSize: 13, marginBottom: 4 }}>
              <span style={{ color: COLORS.textMuted }}>{fmtFecha(ev.fecha)}</span>
              <span style={{ textTransform: "capitalize" }}>{ev.tipo}</span>
              <span style={{ fontWeight: 700, color: ev.resultado === "positiva" ? COLORS.success : ev.resultado === "negativa" ? COLORS.danger : COLORS.earth }}>{ev.resultado}</span>
            </div>
          ))}
          {!(animal.eventos?.length) && <span style={{ color: COLORS.textMuted, fontSize: 13 }}>Sin registros</span>}
        </div>
      )}
      {!esCria && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.textMuted, marginBottom: 10 }}>EVOLUCIÓN DE PESO</div>
          <MiniChart pesadas={animal.pesadas} />
          {animal.pesadas?.length > 0 && (
            <div style={{ marginTop: 10, fontSize: 13, color: COLORS.textMuted }}>
              Último peso: <strong>{animal.pesadas.at(-1).kg} kg</strong>
              {animal.pesadas.length > 1 && <> · Ganancia: <strong style={{ color: COLORS.fieldGreen }}>+{animal.pesadas.at(-1).kg - animal.pesadas[0].kg} kg</strong></>}
            </div>
          )}
        </div>
      )}

      {/* Tratamientos */}
      {tratamientos.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.textMuted, marginBottom: 10 }}>TRATAMIENTOS</div>
          {tratamientos.map((t, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 12px", background: COLORS.bg, borderRadius: 5, fontSize: 13, marginBottom: 4 }}>
              <span style={{ color: COLORS.textMuted }}>{fmtFecha(t.fecha)}</span>
              <span style={{ fontSize: 11 }}>{t.tipoLabel}</span>
              <span style={{ fontWeight: 700 }}>{t.producto}{t.dosis ? ` ${t.dosis}${t.unidad}` : ""}</span>
            </div>
          ))}
        </div>
      )}

      {/* Botón de baja */}
      {animal.viva !== false && !modalBaja && (
        <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 14, marginTop: 4 }}>
          <Btn small variant="danger" onClick={() => setModalBaja(true)}>Dar de baja</Btn>
        </div>
      )}

      {/* Formulario de baja */}
      {modalBaja && (
        <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 14, marginTop: 4 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.danger, marginBottom: 12 }}>Registrar baja</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
            {MOTIVOS.map(m => (
              <div key={m.value} onClick={() => setMotivoBaja(m.value)} style={{ flex: 1, textAlign: "center", padding: "8px 4px", borderRadius: 6, border: `2px solid ${motivoBaja === m.value ? COLORS.danger : COLORS.border}`, background: motivoBaja === m.value ? "#FEE2E2" : COLORS.bg, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                <div style={{ fontSize: 20, marginBottom: 2 }}>{m.icon}</div>
                {m.label}
              </div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
            <DateInput label="Fecha" value={fechaBaja} onChange={setFechaBaja} />
            <Input label="Observación — opcional" value={obsBaja} onChange={setObsBaja} placeholder="ej. Distocía, comprador..." />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn variant="danger" onClick={() => onBaja(animal.id, motivoBaja, fechaBaja, obsBaja)}>Confirmar baja</Btn>
            <Btn variant="ghost" onClick={() => setModalBaja(false)}>Cancelar</Btn>
          </div>
        </div>
      )}
    </Modal>
  );
};

// ── Modal: Importar Excel ────────────────────────────────────────
const ImportarExcel = ({ lotes, onImport, onClose }) => {
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const fileRef = useRef();
  const handleFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setError("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type: "binary" });
        const animalesSheet = wb.Sheets["Animales"];
        if (!animalesSheet) { setError('El archivo debe tener una hoja "Animales".'); setLoading(false); return; }
        const animalesRaw = XLSX.utils.sheet_to_json(animalesSheet);
        const pesadasRaw = wb.Sheets["Pesadas"] ? XLSX.utils.sheet_to_json(wb.Sheets["Pesadas"]) : [];
        const prenezRaw = wb.Sheets["Preñez"] ? XLSX.utils.sheet_to_json(wb.Sheets["Preñez"]) : [];
        const animalesImportados = animalesRaw.map((row, i) => {
          // Soporta nombres de columna en español o inglés
          const caravana = String(row.PLANILLA || row.caravana || "").trim();
          const categoria = String(row.ACTIVIDAD || row.CATEGORIA || row.categoria || "cria").trim().toLowerCase();
          const tipo      = String(row.TIPO || row.tipo || "vaca").trim().toLowerCase();
          const loteNombre = String(row.LOTE || row.lote || "").trim();
          const loteObj = lotes.find(l => l.nombre.toLowerCase() === loteNombre.toLowerCase());
          const pesadas = pesadasRaw.filter(p => String(p.caravana || p.PLANILLA).trim() === caravana).map(p => ({ fecha: toISODate(p.fecha || p.FECHA), kg: Number(p.peso_kg || p.PESO_KG) })).sort((a, b) => a.fecha.localeCompare(b.fecha));
          const eventos = prenezRaw.filter(p => String(p.caravana || p.PLANILLA).trim() === caravana).map(p => ({ fecha: toISODate(p.fecha || p.FECHA), tipo: "preñez", resultado: String(p.resultado || p.RESULTADO || "").trim().toLowerCase() })).sort((a, b) => b.fecha.localeCompare(a.fecha));
          const fechaNac = toISODate(row.fecha_nacimiento || row.FECHA_NAC || "");
          const obs = String(row.observaciones || row.OBS || "").trim();
          return { id: "IMP_" + Date.now() + "_" + i, caravana, categoria: ["cria","recria","engorde"].includes(categoria) ? categoria : "cria", tipo, lote: loteObj?.id || lotes[0]?.id || "", fechaNac, obs, eventos, pesadas, viva: true };
        }).filter(a => a.caravana);
        setPreview({ animales: animalesImportados, pesadasCount: pesadasRaw.length, prenezCount: prenezRaw.length });
      } catch { setError("Error leyendo el archivo."); }
      setLoading(false);
    };
    reader.readAsBinaryString(file);
  };
  return (
    <Modal title="Importar desde Excel" onClose={onClose} wide>
      {!preview ? (
        <div>
          <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 14, marginBottom: 14, fontSize: 13, color: COLORS.textMuted }}>
            <strong style={{ color: COLORS.textPrimary }}>Lotes:</strong> {lotes.map(l => l.nombre).join(", ")}
          </div>
          <div style={{ border: `2px dashed ${COLORS.border}`, borderRadius: 8, padding: 32, textAlign: "center", cursor: "pointer", background: COLORS.bg }} onClick={() => fileRef.current?.click()}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📂</div>
            <div style={{ fontSize: 14, color: COLORS.textMuted }}>Seleccioná tu archivo Excel (.xlsx)</div>
            <input ref={fileRef} type="file" accept=".xlsx" onChange={handleFile} style={{ display: "none" }} />
          </div>
          {loading && <div style={{ textAlign: "center", color: COLORS.textMuted, fontSize: 14, marginTop: 12 }}>Leyendo...</div>}
          {error && <div style={{ background: "#FDEDEC", borderRadius: 6, padding: "10px 14px", fontSize: 13, color: COLORS.danger, marginTop: 12 }}>{error}</div>}
        </div>
      ) : (
        <div>
          <div style={{ background: "#EAFAF1", border: "1px solid #A9DFBF", borderRadius: 8, padding: 14, marginBottom: 14 }}>
            <div style={{ fontWeight: 700, color: COLORS.success, marginBottom: 4 }}>✓ Archivo leído</div>
            <div style={{ fontSize: 13, color: COLORS.textMuted }}>{preview.animales.length} animales · {preview.pesadasCount} pesadas · {preview.prenezCount} preñeces</div>
          </div>
          <div style={{ maxHeight: 240, overflowY: "auto", border: `1px solid ${COLORS.border}`, borderRadius: 6, marginBottom: 14 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr style={{ background: COLORS.fieldGreen, color: "#fff" }}>{["Caravana","Cat.","Lote","Nac.","Pes.","Prñ."].map(h => <th key={h} style={{ padding: "6px 10px", textAlign: "left", fontSize: 11 }}>{h}</th>)}</tr></thead>
              <tbody>{preview.animales.map((a, i) => <tr key={i} style={{ background: i % 2 === 0 ? COLORS.surface : COLORS.bg }}><td style={{ padding: "5px 10px", fontWeight: 600 }}>{a.caravana}</td><td style={{ padding: "5px 10px" }}><Badge cat={a.categoria} /></td><td style={{ padding: "5px 10px", color: COLORS.textMuted, fontSize: 11 }}>{lotes.find(l => l.id === a.lote)?.nombre || "—"}</td><td style={{ padding: "5px 10px", color: COLORS.textMuted, fontSize: 11 }}>{fmtFecha(a.fechaNac)}</td><td style={{ padding: "5px 10px", textAlign: "center" }}>{a.pesadas?.length || 0}</td><td style={{ padding: "5px 10px", textAlign: "center" }}>{a.eventos?.length || 0}</td></tr>)}</tbody>
            </table>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn onClick={() => { onImport(preview.animales); onClose(); }}>Importar {preview.animales.length} animales</Btn>
            <Btn variant="ghost" onClick={() => setPreview(null)}>Volver</Btn>
          </div>
        </div>
      )}
    </Modal>
  );
};

// ── Modal: Juntada ───────────────────────────────────────────────
const VistaJuntada = ({ animales, juntadas, onSave, onClose }) => {
  const [modo, setModo] = useState("lista");
  const [fecha, setFecha] = useState(new Date().toISOString().split("T")[0]);
  // Todos empiezan en "falta"; al tocar pasan a "vino"
  const [estados, setEstados] = useState(() => {
    const init = {};
    animales.filter(a => a.viva !== false).forEach(a => { init[a.id] = "falta"; });
    return init;
  });
  const [confirmando, setConfirmando] = useState(null); // id del animal a confirmar
  const [verDetalle, setVerDetalle] = useState(null);

  const animalesActivos = animales
    .filter(a => a.viva !== false)
    .sort((a, b) => a.caravana.localeCompare(b.caravana, "es", { numeric: true }));

  const falta = animalesActivos.filter(a => estados[a.id] === "falta");
  const vino  = animalesActivos.filter(a => estados[a.id] === "vino");

  const moverAVino = (id) => {
    setEstados(p => ({ ...p, [id]: "vino" }));
    setConfirmando(null);
  };
  const volverAFalta = (id) => {
    setEstados(p => ({ ...p, [id]: "falta" }));
    setConfirmando(null);
  };

  if (modo === "lista") return (
    <Modal title="Juntadas" onClose={onClose}>
      <Btn onClick={() => {
        const init = {};
        animales.filter(a => a.viva !== false).forEach(a => { init[a.id] = "falta"; });
        setEstados(init);
        setModo("nueva");
      }} style={{ marginBottom: 14 }}>+ Nueva juntada</Btn>
      {juntadas.length === 0 && <p style={{ color: COLORS.textMuted, fontSize: 14 }}>Sin juntadas.</p>}
      {juntadas.map(j => {
        const v = Object.values(j.animales).filter(x => x === "vino").length;
        const f = Object.values(j.animales).filter(x => x === "falta").length;
        return (
          <Card key={j.id} onClick={() => setVerDetalle(verDetalle?.id === j.id ? null : j)} style={{ marginBottom: 8 }}>
            <div style={{ fontWeight: 700 }}>{fmtFecha(j.fecha)}</div>
            <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 3 }}>
              <span style={{ color: COLORS.success, fontWeight: 600 }}>✓ {v} vinieron</span>
              {f > 0 && <span style={{ color: COLORS.danger, fontWeight: 600, marginLeft: 10 }}>✗ {f} faltaron</span>}
            </div>
            {verDetalle?.id === j.id && (
              <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.success, marginBottom: 4 }}>VINIERON</div>
                  {animalesActivos.filter(a => j.animales[a.id] === "vino").map(a => <div key={a.id} style={{ fontSize: 12, padding: "2px 0" }}>✓ {a.caravana}</div>)}
                </div>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.danger, marginBottom: 4 }}>FALTARON</div>
                  {animalesActivos.filter(a => j.animales[a.id] === "falta").map(a => <div key={a.id} style={{ fontSize: 12, padding: "2px 0" }}>✗ {a.caravana}</div>)}
                </div>
              </div>
            )}
          </Card>
        );
      })}
    </Modal>
  );

  return (
    <Modal title="Nueva juntada" onClose={onClose} wide>
      <div style={{ display: "flex", gap: 12, alignItems: "flex-end", marginBottom: 16 }}>
        <DateInput label="Fecha" value={fecha} onChange={setFecha} />
        <div style={{ fontSize: 13, color: COLORS.textMuted, paddingBottom: 2 }}>
          <span style={{ color: COLORS.success, fontWeight: 700 }}>✓ {vino.length}</span>
          <span style={{ margin: "0 6px", color: COLORS.border }}>·</span>
          <span style={{ color: COLORS.danger, fontWeight: 700 }}>✗ {falta.length}</span>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        {/* Columna FALTA */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.danger, marginBottom: 8, letterSpacing: "0.06em" }}>
            FALTA ({falta.length})
          </div>
          <div style={{ maxHeight: 380, overflowY: "auto", display: "flex", flexDirection: "column", gap: 4 }}>
            {falta.map(a => (
              <div key={a.id}>
                {confirmando === a.id ? (
                  <div style={{ background: "#FEF3C7", border: "2px solid #F59E0B", borderRadius: 6, padding: "6px 8px" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4 }}>¿{a.caravana} vino?</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => moverAVino(a.id)} style={{ flex: 1, background: COLORS.success, color: "#fff", border: "none", borderRadius: 4, padding: "5px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✓ Sí</button>
                      <button onClick={() => setConfirmando(null)} style={{ flex: 1, background: COLORS.border, color: COLORS.textPrimary, border: "none", borderRadius: 4, padding: "5px 0", fontSize: 12, cursor: "pointer" }}>No</button>
                    </div>
                  </div>
                ) : (
                  <div onClick={() => setConfirmando(a.id)} style={{ padding: "7px 10px", background: "#FEF2F2", border: `1px solid #FECACA`, borderRadius: 5, cursor: "pointer", fontSize: 13, fontWeight: 600, color: COLORS.danger, userSelect: "none" }}>
                    ✗ {a.caravana}
                  </div>
                )}
              </div>
            ))}
            {falta.length === 0 && <div style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic", padding: "8px 0" }}>Todos presentes</div>}
          </div>
        </div>

        {/* Columna VINO */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.success, marginBottom: 8, letterSpacing: "0.06em" }}>
            VINO ({vino.length})
          </div>
          <div style={{ maxHeight: 380, overflowY: "auto", display: "flex", flexDirection: "column", gap: 4 }}>
            {vino.map(a => (
              <div key={a.id}>
                {confirmando === "volver_" + a.id ? (
                  <div style={{ background: "#FEF3C7", border: "2px solid #F59E0B", borderRadius: 6, padding: "6px 8px" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4 }}>¿Pasar {a.caravana} a Falta?</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => volverAFalta(a.id)} style={{ flex: 1, background: COLORS.danger, color: "#fff", border: "none", borderRadius: 4, padding: "5px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✗ Sí</button>
                      <button onClick={() => setConfirmando(null)} style={{ flex: 1, background: COLORS.border, color: COLORS.textPrimary, border: "none", borderRadius: 4, padding: "5px 0", fontSize: 12, cursor: "pointer" }}>No</button>
                    </div>
                  </div>
                ) : (
                  <div onClick={() => setConfirmando("volver_" + a.id)} style={{ padding: "7px 10px", background: "#F0FDF4", border: `1px solid #BBF7D0`, borderRadius: 5, cursor: "pointer", fontSize: 13, fontWeight: 600, color: COLORS.success, userSelect: "none" }}>
                    ✓ {a.caravana}
                  </div>
                )}
              </div>
            ))}
            {vino.length === 0 && <div style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic", padding: "8px 0" }}>Ninguno aún</div>}
          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <Btn onClick={() => { onSave({ id: "J" + Date.now(), fecha, animales: estados }); setModo("lista"); }}>
          Guardar juntada
        </Btn>
        <Btn variant="ghost" onClick={() => setModo("lista")}>Cancelar</Btn>
      </div>
    </Modal>
  );
};

// ── Modal: Recorridas ────────────────────────────────────────────
const VistaRecorridas = ({ recorridas, onSave, onActualizar, onEliminar, onClose }) => {
  const [texto, setTexto] = useState("");
  const [fecha, setFecha] = useState(new Date().toISOString().split("T")[0]);
  const [editando, setEditando] = useState(null); // { id, texto, fecha }

  const iniciarEdicion = (r) => setEditando({ id: r.id, texto: r.texto, fecha: r.fecha });
  const guardarEdicion = () => {
    if (!editando.texto.trim()) return;
    onActualizar(editando);
    setEditando(null);
  };

  return (
    <Modal title="Reportes de recorrida" onClose={onClose}>
      {/* Formulario nueva novedad */}
      <div style={{ marginBottom: 20 }}>
        <DateInput label="Fecha" value={fecha} onChange={setFecha} style={{ marginBottom: 10 }} />
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: "0.05em" }}>NOVEDAD</label>
          <textarea value={texto} onChange={e => setTexto(e.target.value)} placeholder="ej: Murió vaca 133 en lote 1..." rows={3}
            style={{ border: `1px solid ${COLORS.border}`, borderRadius: 5, padding: "8px 10px", fontSize: 14, fontFamily: "system-ui, sans-serif", background: COLORS.bg, resize: "vertical", outline: "none" }} />
        </div>
        <Btn onClick={() => { if (!texto.trim()) return; onSave({ id: "R" + Date.now(), fecha, texto: texto.trim() }); setTexto(""); }}
          style={{ marginTop: 10 }} disabled={!texto.trim()}>Registrar</Btn>
      </div>

      {/* Historial editable */}
      <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textMuted, marginBottom: 10 }}>HISTORIAL</div>
        {recorridas.length === 0 && <div style={{ color: COLORS.textMuted, fontSize: 14 }}>Sin novedades.</div>}
        {[...recorridas].sort((a, b) => b.fecha.localeCompare(a.fecha)).map(r => (
          <div key={r.id} style={{ borderBottom: `1px solid ${COLORS.border}`, padding: "10px 0" }}>
            {editando?.id === r.id ? (
              /* Modo edición */
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <DateInput label="" value={editando.fecha} onChange={v => setEditando(p => ({ ...p, fecha: v }))} />
                <textarea value={editando.texto} onChange={e => setEditando(p => ({ ...p, texto: e.target.value }))} rows={3}
                  style={{ border: `1.5px solid ${COLORS.fieldGreen}`, borderRadius: 5, padding: "8px 10px", fontSize: 14, fontFamily: "system-ui, sans-serif", background: COLORS.bg, resize: "vertical", outline: "none" }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn small onClick={guardarEdicion} disabled={!editando.texto.trim()}>Guardar</Btn>
                  <Btn small variant="ghost" onClick={() => setEditando(null)}>Cancelar</Btn>
                </div>
              </div>
            ) : (
              /* Modo lectura */
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ minWidth: 68, fontSize: 11, color: COLORS.textMuted, paddingTop: 2 }}>{fmtFecha(r.fecha)}</div>
                <div style={{ flex: 1, fontSize: 14, lineHeight: 1.5 }}>{r.texto}</div>
                <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  <button onClick={() => iniciarEdicion(r)} style={{ background: "none", border: `1px solid ${COLORS.border}`, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.textMuted }}>✏</button>
                  <button onClick={() => onEliminar(r.id)} style={{ background: "none", border: `1px solid #FECACA`, borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12, color: COLORS.danger }}>✕</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </Modal>
  );
};
